<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PP2 Cognition Pharmacology — 60Q Mock Exam</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --pd:#4c1d95;--p:#7c3aed;--pl:#a78bfa;--pp:#ede9fe;
  --b:#3b82f6;--bl:#93c5fd;--bp:#dbeafe;
  --pk:#ec4899;--pkl:#f9a8d4;--pkp:#fce7f3;
  --ok:#10b981;--okb:#d1fae5;--err:#ef4444;--errb:#fee2e2;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:linear-gradient(135deg,#1e1b4b 0%,#4c1d95 35%,#7c3aed 65%,#3b82f6 100%);min-height:100vh;padding:20px;color:#1e1b4b;}
.wrap{max-width:920px;margin:0 auto;}
/* HEADER */
.hdr{text-align:center;padding:28px 0 20px;}
.hdr-badge{display:inline-block;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;padding:5px 16px;border-radius:999px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;}
.hdr h1{font-family:'Playfair Display',serif;font-size:clamp(22px,3.8vw,38px);color:#fff;text-shadow:0 2px 18px rgba(0,0,0,.3);margin-bottom:6px;}
.hdr p{color:rgba(255,255,255,.72);font-size:14px;font-weight:300;}
/* STATS */
.sbar{display:flex;gap:10px;justify-content:center;margin-bottom:20px;flex-wrap:wrap;}
.chip{background:rgba(255,255,255,.15);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.25);color:#fff;padding:7px 16px;border-radius:999px;font-size:12px;font-weight:500;}
.chip span{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;}
/* PROGRESS */
.prog-wrap{background:rgba(255,255,255,.2);border-radius:999px;height:7px;margin-bottom:24px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--pk),var(--pl),var(--bl));border-radius:999px;transition:width .5s cubic-bezier(.4,0,.2,1);}
/* CARD */
.card{background:rgba(255,255,255,.97);border-radius:22px;padding:36px 38px;box-shadow:0 22px 55px rgba(76,29,149,.24),0 0 0 1px rgba(255,255,255,.5);margin-bottom:20px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--pk),var(--p),var(--b));}
/* META */
.qmeta{display:flex;align-items:center;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
.qnum{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--p);background:var(--pp);padding:3px 11px;border-radius:999px;}
.qbadge{font-size:10px;font-weight:600;padding:3px 10px;border-radius:999px;letter-spacing:.5px;text-transform:uppercase;}
.bmc{background:#dbeafe;color:#1d4ed8;}.bsata{background:#fce7f3;color:#be185d;}.bmatrix{background:#d1fae5;color:#065f46;}.bbowtie{background:#fef3c7;color:#92400e;}
.dtag{font-size:10px;font-weight:600;background:linear-gradient(135deg,var(--pp),var(--pkp));color:var(--pd);padding:3px 10px;border-radius:999px;border:1px solid var(--pl);}
.sinst{font-size:12.5px;font-style:italic;color:var(--pk);background:var(--pkp);border:1px solid var(--pkl);padding:7px 12px;border-radius:9px;margin-bottom:14px;font-weight:500;}
/* STEM */
.stem{font-size:16px;line-height:1.72;color:#1e1b4b;font-weight:500;margin-bottom:24px;}
.stem strong{color:var(--pd);}
/* OPTIONS */
.opts{display:flex;flex-direction:column;gap:10px;}
.opt{display:flex;align-items:flex-start;gap:12px;padding:14px 18px;border:2px solid #e5e0f5;border-radius:13px;cursor:pointer;transition:all .18s;background:#fff;}
.opt:hover:not(.dis){border-color:var(--pl);background:var(--pp);transform:translateX(3px);}
.opt input{margin-top:3px;flex-shrink:0;accent-color:var(--p);width:17px;height:17px;cursor:pointer;}
.opt label{cursor:pointer;font-size:14.5px;line-height:1.6;color:#1e1b4b;}
.opt.cor{border-color:var(--ok)!important;background:var(--okb)!important;}
.opt.wrg{border-color:var(--err)!important;background:var(--errb)!important;}
.opt.msd{border-color:var(--ok)!important;background:#ecfdf5!important;}
.opt.dis{cursor:default;}.opt.dis:hover{transform:none;}
/* MATRIX */
.mtbl{width:100%;border-collapse:separate;border-spacing:0;border-radius:13px;overflow:hidden;margin-bottom:8px;}
.mtbl th{padding:11px 14px;font-size:12px;font-weight:600;letter-spacing:.5px;text-align:center;background:linear-gradient(135deg,var(--p),var(--b));color:#fff;}
.mtbl th:first-child{text-align:left;}
.mtbl td{padding:13px 14px;border-bottom:1px solid #e5e0f5;font-size:13.5px;vertical-align:middle;}
.mtbl td:not(:first-child){text-align:center;}
.mtbl tr:last-child td{border-bottom:none;}
.mtbl tr:nth-child(even) td{background:#faf9ff;}
.mtbl tr:nth-child(odd) td{background:#fff;}
.mtbl tr.rc td{background:#d1fae5!important;}
.mtbl tr.rw td{background:#fee2e2!important;}
.mtbl input[type=radio]{accent-color:var(--p);width:15px;height:15px;cursor:pointer;}
.mtbl input[type=radio]:disabled{cursor:default;}
/* BOWTIE */
.bt-wrap{display:grid;grid-template-columns:1fr auto 1fr;gap:14px;align-items:start;margin-bottom:10px;}
.bt-sec{background:var(--pp);border:2px solid var(--pl);border-radius:15px;padding:16px;}
.bt-ctr{background:linear-gradient(135deg,var(--pkp),var(--pp));border-color:var(--pkl);align-self:center;}
.bt-arr{display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--p);align-self:center;}
.bt-sec h4{font-size:11px;text-transform:uppercase;letter-spacing:1px;font-weight:700;color:var(--p);margin-bottom:10px;font-family:'Space Mono',monospace;}
.bt-ctr h4{color:var(--pk);}
.bt-inf{font-size:11px;color:var(--p);font-style:italic;margin-bottom:8px;}
.bopt{display:flex;align-items:flex-start;gap:9px;padding:9px 11px;border-radius:9px;border:1.5px solid rgba(124,58,237,.18);background:#fff;margin-bottom:7px;cursor:pointer;transition:all .15s;}
.bopt:hover:not(.dis){border-color:var(--p);background:var(--pp);}
.bopt input{margin-top:2px;accent-color:var(--p);flex-shrink:0;}
.bopt label{font-size:12.5px;line-height:1.5;cursor:pointer;}
.bopt.cor{border-color:var(--ok)!important;background:var(--okb)!important;}
.bopt.wrg{border-color:var(--err)!important;background:var(--errb)!important;}
.bopt.msd{border-color:var(--ok)!important;background:#ecfdf5!important;}
.bopt.dis{cursor:default;}
@media(max-width:620px){.bt-wrap{grid-template-columns:1fr;}.bt-arr{transform:rotate(90deg);}}
/* SUBMIT */
.brow{display:flex;justify-content:center;margin-top:24px;}
.bsub{background:linear-gradient(135deg,var(--p),var(--b));color:#fff;border:none;padding:13px 44px;border-radius:999px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;letter-spacing:.2px;box-shadow:0 7px 22px rgba(124,58,237,.38);transition:all .18s;}
.bsub:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 10px 28px rgba(124,58,237,.48);}
.bsub:disabled{opacity:.45;cursor:default;transform:none;}
/* RATIONALE */
.rat{background:linear-gradient(135deg,#f5f3ff,#fff);border:2px solid var(--pl);border-radius:16px;padding:26px;margin-top:22px;animation:sli .38s ease;}
@keyframes sli{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.rat h3{font-family:'Playfair Display',serif;font-size:19px;color:var(--pd);margin-bottom:14px;}
.rpill{display:inline-flex;align-items:center;gap:5px;padding:5px 14px;border-radius:999px;font-size:12.5px;font-weight:600;margin-bottom:14px;}
.rpill.ok{background:var(--okb);color:#065f46;}.rpill.err{background:var(--errb);color:#991b1b;}
.rtxt{font-size:14px;line-height:1.78;color:#374151;margin-bottom:12px;}
.rtxt strong{color:var(--pd);}
.rbd h4{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--p);font-weight:700;margin-bottom:9px;margin-top:14px;}
.ri{display:flex;gap:9px;padding:9px 13px;border-radius:9px;margin-bottom:7px;font-size:13px;line-height:1.6;}
.ri.rc{background:#d1fae5;border-left:3px solid var(--ok);}
.ri.rw{background:#fee2e2;border-left:3px solid var(--err);}
.rl{font-family:'Space Mono',monospace;font-weight:700;font-size:12px;flex-shrink:0;margin-top:1px;}
.rl.lc{color:#065f46;}.rl.lw{color:#991b1b;}
/* MEMORY */
.mem{background:linear-gradient(135deg,var(--pkp),var(--pp));border:2px solid var(--pkl);border-radius:13px;padding:16px 20px;margin-top:14px;}
.mem h4{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--pk);font-weight:700;margin-bottom:7px;font-family:'Space Mono',monospace;}
.mem p{font-size:13.5px;line-height:1.65;color:#1e1b4b;}
/* NAV */
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:22px;}
.bnav{background:rgba(255,255,255,.15);backdrop-filter:blur(10px);border:1.5px solid rgba(255,255,255,.3);color:#fff;padding:11px 24px;border-radius:999px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .18s;}
.bnav:hover:not(:disabled){background:rgba(255,255,255,.25);transform:translateY(-1px);}
.bnav:disabled{opacity:.28;cursor:default;}
.dots{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;max-width:420px;}
.dot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.22);cursor:pointer;transition:all .18s;flex-shrink:0;}
.dot.active{background:#fff;transform:scale(1.35);}
.dot.acor{background:#6ee7b7;}
.dot.awrg{background:#fca5a5;}
/* POPUP */
.pop{position:fixed;inset:0;background:rgba(76,29,149,.6);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:100;animation:pin .28s ease;}
@keyframes pin{from{opacity:0;}to{opacity:1;}}
.popc{background:#fff;border-radius:22px;padding:38px 46px;text-align:center;max-width:360px;width:90%;box-shadow:0 28px 70px rgba(76,29,149,.38);animation:pup .28s cubic-bezier(.34,1.56,.64,1);}
@keyframes pup{from{transform:scale(.7);opacity:0;}to{transform:scale(1);opacity:1;}}
.pe{font-size:50px;margin-bottom:10px;}
.pt{font-family:'Playfair Display',serif;font-size:24px;color:var(--pd);margin-bottom:7px;}
.ps{color:#6b7280;font-size:14px;margin-bottom:22px;}
.pbtn{background:linear-gradient(135deg,var(--p),var(--pk));color:#fff;border:none;padding:12px 34px;border-radius:999px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 5px 18px rgba(124,58,237,.38);transition:all .18s;}
.pbtn:hover{transform:translateY(-1px);}
/* END */
#end{display:none;}
.endc{background:rgba(255,255,255,.97);border-radius:26px;padding:48px 36px;text-align:center;box-shadow:0 28px 70px rgba(76,29,149,.28);}
.enem{font-size:68px;margin-bottom:14px;}
.ent{font-family:'Playfair Display',serif;font-size:34px;color:var(--pd);margin-bottom:8px;}
.ensc{font-size:50px;font-weight:700;background:linear-gradient(135deg,var(--p),var(--pk));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:18px 0;font-family:'Space Mono',monospace;}
.enbd{display:flex;gap:14px;justify-content:center;margin:22px 0;flex-wrap:wrap;}
.enst{background:var(--pp);border-radius:13px;padding:14px 22px;min-width:95px;}
.ensn{font-size:26px;font-weight:700;color:var(--p);font-family:'Space Mono',monospace;}
.ensl{font-size:11px;color:#6b7280;margin-top:3px;}
.enmsg{font-size:16px;color:#374151;margin:14px 0;line-height:1.6;}
.bres{background:linear-gradient(135deg,var(--p),var(--b));color:#fff;border:none;padding:15px 44px;border-radius:999px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;box-shadow:0 7px 22px rgba(124,58,237,.38);transition:all .18s;font-family:'DM Sans',sans-serif;}
.bres:hover{transform:translateY(-2px);}
@media(max-width:580px){.card{padding:22px 18px;}.stem{font-size:14.5px;}.opt{padding:12px 15px;}.opt label{font-size:13.5px;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-badge">PP2 ✦ Cognition Pharmacology</div>
    <h1>Parkinson's &amp; Alzheimer's Pharmacology</h1>
    <p>60-Question Application-Level Mock Exam · NCLEX-Style</p>
  </div>
  <div class="sbar">
    <div class="chip">Question <span id="qc">1</span> / 60</div>
    <div class="chip">✅ <span id="cc">0</span> Correct</div>
    <div class="chip">❌ <span id="wc">0</span> Incorrect</div>
    <div class="chip">Score <span id="sp">—</span></div>
  </div>
  <div class="prog-wrap"><div class="prog-fill" id="pf" style="width:1.67%"></div></div>
  <div id="qa"></div>
  <div class="nav">
    <button class="bnav" id="bprev" onclick="nav(-1)" disabled>← Prev</button>
    <div class="dots" id="dots"></div>
    <button class="bnav" id="bnext" onclick="nav(1)" disabled>Next →</button>
  </div>
</div>

<div id="end">
  <div class="wrap">
    <div class="endc">
      <div class="enem" id="ee">🎉</div>
      <div class="ent">Exam Complete!</div>
      <div class="ensc" id="esc">0/60</div>
      <div class="enbd">
        <div class="enst"><div class="ensn" id="ecc">0</div><div class="ensl">Correct</div></div>
        <div class="enst"><div class="ensn" id="ewc">0</div><div class="ensl">Incorrect</div></div>
        <div class="enst"><div class="ensn" id="epc">0%</div><div class="ensl">Score</div></div>
      </div>
      <div class="enmsg" id="emsg"></div>
      <button class="bres" onclick="restart()">🔄 Restart Exam</button>
    </div>
  </div>
</div>

<div id="pop" class="pop" style="display:none;">
  <div class="popc">
    <div class="pe" id="pe">🌟</div>
    <div class="pt" id="pt">Correct!</div>
    <div class="ps" id="ps">Excellent clinical reasoning!</div>
    <button class="pbtn" onclick="closePop()">Continue</button>
  </div>
</div>

<script>
const Q=[
// ════════════════════════════════════════
// CARBIDOPA / LEVODOPA  Q1–10
// ════════════════════════════════════════
{id:1,type:'mc',drug:'Carbidopa/Levodopa',tag:"Parkinson's",
stem:'A client with Parkinson\'s disease who has been taking carbidopa/levodopa for two weeks calls the clinic stating, "The medication is not doing anything — I feel exactly the same." Which nurse response is most appropriate?',
opts:[
{id:'a',text:'Instruct the client to double the current dose until symptoms improve, then return to the prescribed dose'},
{id:'b',text:'Advise the client that full therapeutic effects may not be apparent for several months and to continue taking the medication as prescribed',correct:true},
{id:'c',text:'Recommend the client stop carbidopa/levodopa and schedule an appointment to discuss alternative agents'},
{id:'d',text:'Inform the client that symptom improvement within the first week is the expected response and the dose likely needs adjustment'}
],
rat:'<strong>B is correct.</strong> Carbidopa/levodopa requires several months before full therapeutic effects are achieved. Clients who stop the medication prematurely or independently adjust doses risk inadequate symptom control and rebound. Option A is dangerous — self-adjusting doses increases toxicity and dyskinesia risk. Option D is incorrect because early improvement within the first week is not the expected timeline.',
bd:{a:'❌ Self-adjusting doses is unsafe and not within the nurse\'s scope to recommend.',b:'✅ Several months is the correct therapeutic timeline for carbidopa/levodopa.',c:'❌ Abruptly discontinuing Parkinson\'s medications can precipitate severe rebound symptoms.',d:'❌ Expecting full benefit in the first week is incorrect and sets unrealistic expectations.'},
mem:'⏳ Carbidopa/levodopa = SLOW BUILD. Think "months, not days." Clients who give up early never get the chance to see the benefit. Always counsel realistic timelines to prevent premature discontinuation!'},

{id:2,type:'mc',drug:'Carbidopa/Levodopa',tag:"Parkinson's",
stem:'The nurse is preparing to administer the morning dose of carbidopa/levodopa to a client with Parkinson\'s disease. A review of the client\'s breakfast tray shows a meal of eggs, steak, and a protein supplement shake. Which action should the nurse take?',
opts:[
{id:'a',text:'Administer the medication with the meal since food reduces GI upset from levodopa'},
{id:'b',text:'Hold the medication until after the meal is complete and the tray is removed, then administer with water'},
{id:'c',text:'Administer the medication with a small amount of water now, and counsel the client to space high-protein foods from medication times',correct:true},
{id:'d',text:'Contact the dietary department to substitute the protein foods with carbohydrate-based alternatives before administration'}
],
rat:'<strong>C is correct.</strong> High-protein meals compete with levodopa for absorption at the intestinal level via the same amino acid transporter. The nurse should administer the medication while educating the client about spacing high-protein foods from medication times — not eliminate protein entirely or delay the scheduled dose without provider direction.',
bd:{a:'❌ Taking levodopa with high-protein foods is specifically contraindicated due to competitive absorption.',b:'❌ Holding a scheduled medication without provider order is outside nursing scope; this also delays treatment.',c:'✅ Administer as scheduled and reinforce teaching about protein spacing — this addresses both safety and adherence.',d:'❌ Changing the diet without provider or dietitian order is outside nursing scope and overly restrictive.'},
mem:'🥩 Protein = Levodopa\'s competitor at the gut transporter. They share the same entry point. Administer the drug, then TEACH spacing — don\'t eliminate protein entirely, just separate it from dose times.'},

{id:3,type:'mc',drug:'Carbidopa/Levodopa',tag:"Parkinson's",
stem:'A client with Parkinson\'s disease on carbidopa/levodopa reports noticing their sweat has turned a dark brownish color and is staining their clothing. The client appears distressed and asks whether this indicates a serious problem. Which nursing response is most accurate?',
opts:[
{id:'a',text:'Reassure the client that darkening of sweat and urine is a known, harmless effect of levodopa and does not indicate toxicity or organ damage',correct:true},
{id:'b',text:'Instruct the client to stop the medication immediately and report to the emergency department for liver function evaluation'},
{id:'c',text:'Notify the provider that the client may be experiencing signs of renal failure secondary to carbidopa/levodopa therapy'},
{id:'d',text:'Explain that the discoloration is caused by carbidopa specifically and the provider may need to adjust the carbidopa component of the dose'}
],
rat:'<strong>A is correct.</strong> Darkening of sweat, urine, and saliva is a documented, benign side effect of levodopa. It does not indicate toxicity, organ damage, or renal/hepatic failure. Clients should be reassured and taught about this effect proactively to prevent alarm.',
bd:{a:'✅ Darkened secretions are explicitly listed as a harmless, expected side effect of levodopa.',b:'❌ Stopping the medication abruptly and seeking emergency care is an overreaction to a benign finding.',c:'❌ Dark sweat is not associated with renal failure — this would cause false alarm and unnecessary testing.',d:'❌ The darkening is attributable to levodopa metabolites, not specifically carbidopa, and no dose adjustment is indicated.'},
mem:'🟤 "Dark sweat = harmless metabolite." Levodopa breaks down into pigmented compounds. Tell clients BEFORE they notice it — proactive teaching prevents panic. It does NOT mean the kidneys or liver are failing!'},

{id:4,type:'mc',drug:'Carbidopa/Levodopa',tag:"Parkinson's",
stem:'A client with Parkinson\'s disease who has been taking carbidopa/levodopa for three years develops involuntary, writhing movements of the trunk and extremities that occur at peak medication times. The nurse anticipates the provider will address this complication by considering which intervention?',
opts:[
{id:'a',text:'Discontinuing carbidopa/levodopa and transitioning to an anticholinergic agent'},
{id:'b',text:'Adding amantadine to the regimen or reducing the carbidopa/levodopa dose',correct:true},
{id:'c',text:'Increasing the carbidopa/levodopa dose to overcome the motor fluctuations'},
{id:'d',text:'Initiating a selective serotonin reuptake inhibitor to manage the involuntary movements'}
],
rat:'<strong>B is correct.</strong> The described presentation is levodopa-induced dyskinesia — involuntary movements occurring at peak drug concentration. Management includes dose reduction and/or adding amantadine, which has antidyskinetic properties. Increasing the dose would worsen dyskinesias. SSRIs do not treat motor dyskinesias.',
bd:{a:'❌ Abruptly discontinuing long-term carbidopa/levodopa is dangerous; anticholinergics are not indicated for dyskinesia.',b:'✅ Amantadine is specifically indicated to reduce levodopa-induced dyskinesias; dose reduction is also a strategy.',c:'❌ Increasing the dose would intensify dyskinesia — more levodopa at peak levels makes peak-dose dyskinesias worse.',d:'❌ SSRIs address mood; they are not used to treat motor dyskinesias and carry serotonin syndrome risk with selegiline.'},
mem:'💊 Peak-dose dyskinesia = too much dopamine at peak. Solution = reduce the peaks. Amantadine "smooths out" the dyskinesia. Increasing levodopa = making it worse. Decreasing + add amantadine = the classic fix.'},

{id:5,type:'sata',drug:'Carbidopa/Levodopa',tag:"Parkinson's",
stem:'The nurse is reviewing a client\'s medication administration record. The client takes carbidopa/levodopa for Parkinson\'s disease. Which co-prescribed medications require the nurse to follow up with the provider before administering? <em>Select all that apply.</em>',
opts:[
{id:'a',text:'Risperidone 1 mg orally at bedtime',correct:true},
{id:'b',text:'Phenelzine 15 mg orally twice daily',correct:true},
{id:'c',text:'Entacapone 200 mg orally with each levodopa dose'},
{id:'d',text:'Benztropine 1 mg orally twice daily',correct:true},
{id:'e',text:'Chlorpromazine 25 mg orally three times daily',correct:true},
{id:'f',text:'Pramipexole 0.5 mg orally three times daily'}
],
rat:'<strong>A, B, D, and E require follow-up.</strong> Risperidone and chlorpromazine are dopamine receptor antagonists — they directly oppose carbidopa/levodopa\'s mechanism. Phenelzine (MAOI) combined with levodopa risks hypertensive crisis. Benztropine (anticholinergic) can enhance levodopa responses excessively, worsening dyskinesias. Entacapone and pramipexole are intended therapeutic adjuncts — no concern.',
bd:{a:'✅ Risperidone blocks D2 receptors, directly opposing levodopa\'s therapeutic effect.',b:'✅ MAO inhibitor + levodopa = hypertensive crisis risk — a critical interaction.',c:'❌ Entacapone is a COMT inhibitor used therapeutically alongside carbidopa/levodopa.',d:'✅ Anticholinergics can enhance levodopa responses excessively, increasing adverse effects.',e:'✅ Chlorpromazine is a dopamine antagonist — same problem as risperidone.',f:'❌ Pramipexole is a dopamine agonist used as a complementary adjunct.'},
mem:'🚨 Levodopa enemies: "2 Antipsychotics + MAOIs + too much Anticholinergic." Antipsychotics = dopamine blockers. MAOIs = hypertensive crisis. Anticholinergics = enhance levodopa TOO much. Adjuncts (entacapone, pramipexole) = intended combinations.'},

{id:6,type:'mc',drug:'Carbidopa/Levodopa',tag:"Parkinson's",
stem:'A client on carbidopa/levodopa who also takes a daily vitamin supplement asks whether the vitamin could affect the medication. The nurse is most concerned about which vitamin in the supplement?',
opts:[
{id:'a',text:'Vitamin C (ascorbic acid), which can increase levodopa excretion and reduce its plasma levels'},
{id:'b',text:'Vitamin B6 (pyridoxine), which accelerates peripheral conversion of levodopa to dopamine, reducing the amount that reaches the brain',correct:true},
{id:'c',text:'Vitamin D, which competes with levodopa for intestinal absorption at calcium-dependent transporters'},
{id:'d',text:'Vitamin E (tocopherol), which inhibits carbidopa and prevents levodopa from crossing the blood-brain barrier'}
],
rat:'<strong>B is correct.</strong> Pyridoxine (vitamin B6) is a cofactor for DOPA decarboxylase — the enzyme that converts levodopa to dopamine. Without carbidopa to block this peripheral conversion, vitamin B6 speeds up the breakdown of levodopa in peripheral tissues, reducing how much reaches the brain. However, carbidopa largely counteracts this interaction.',
bd:{a:'❌ Vitamin C is not documented to significantly reduce levodopa absorption or accelerate its excretion.',b:'✅ Vitamin B6 is a cofactor for peripheral DOPA decarboxylase — it can enhance peripheral levodopa breakdown. This is why carbidopa\'s role as a decarboxylase inhibitor is so critical.',c:'❌ Vitamin D does not compete with levodopa at intestinal transporters; this is not a documented interaction.',d:'❌ Vitamin E does not affect carbidopa or the BBB crossing mechanism.'},
mem:'🔬 B6 = DOPA decarboxylase cofactor = breaks down levodopa PERIPHERALLY. More B6 = more peripheral breakdown = less levodopa reaches the brain. Carbidopa blocks this, but high-dose B6 supplementation still warrants caution. Always ask about vitamins!'},

{id:7,type:'sata',drug:'Carbidopa/Levodopa',tag:"Parkinson's",
stem:'The nurse is evaluating a client who has been taking carbidopa/levodopa for six months. Which findings indicate the medication is achieving its intended therapeutic effect? <em>Select all that apply.</em>',
opts:[
{id:'a',text:'The client reports improved ability to button clothing and use utensils independently',correct:true},
{id:'b',text:'The client\'s gait has improved and episodes of "freezing" have decreased in frequency',correct:true},
{id:'c',text:'The client\'s resting tremor is less severe than documented at the time of diagnosis',correct:true},
{id:'d',text:'The client has gained 5 pounds and reports increased appetite since starting the medication'},
{id:'e',text:'The client\'s rigidity and bradykinesia have both improved on physical examination',correct:true},
{id:'f',text:'The client reports feeling "wound up" and has not been sleeping more than 3 hours nightly'}
],
rat:'<strong>A, B, C, and E are correct.</strong> The therapeutic goals of carbidopa/levodopa are reduction of the cardinal signs of Parkinson\'s disease: tremor, rigidity, bradykinesia, and postural instability — resulting in improved ADL performance and function. Weight gain is not a listed therapeutic effect. Insomnia is an adverse effect of some Parkinson\'s medications (e.g., selegiline) and is not a desired outcome.',
bd:{a:'✅ Improved fine motor control reflects improved dopaminergic function in the striatum.',b:'✅ Reduced freezing episodes and improved gait are key therapeutic outcomes.',c:'✅ Reduction in resting tremor is a cardinal therapeutic goal.',d:'❌ Increased appetite and weight gain are not listed therapeutic effects of carbidopa/levodopa.',e:'✅ Improved rigidity and bradykinesia reflect direct response to dopamine restoration.',f:'❌ Insomnia is not therapeutic — it is an adverse effect (more closely associated with selegiline).'},
mem:'🎯 Levodopa therapeutic goals = "TRaB" — Tremor reduced, Rigidity reduced, Bradykinesia reduced. All three = improved ADLs. If you see the client buttoning shirts, walking better, freezing less = the drug is WORKING!'},

{id:8,type:'mc',drug:'Carbidopa/Levodopa',tag:"Parkinson's",
stem:'A client with Parkinson\'s disease reports that their carbidopa/levodopa wears off about two hours before the next scheduled dose, causing a predictable return of tremors and difficulty walking every afternoon. The provider is evaluating management options. Which description best characterizes this phenomenon?',
opts:[
{id:'a',text:'Peak-dose dyskinesia, in which excessive dopamine at peak concentration causes involuntary movements'},
{id:'b',text:'The "on-off" phenomenon, in which unpredictable symptom fluctuations occur with no relationship to dosing schedule'},
{id:'c',text:'The "wearing-off" effect, in which levodopa\'s duration of action shortens over time causing predictable end-of-dose symptom return',correct:true},
{id:'d',text:'Levodopa toxicity, in which accumulation over time leads to breakthrough CNS adverse effects between doses'}
],
rat:'<strong>C is correct.</strong> The wearing-off effect is characterized by predictable, end-of-dose return of symptoms that correlates with the medication\'s declining plasma level before the next dose. This is different from the true on-off phenomenon, which is unpredictable and not dose-related. Management includes dose adjustment, shorter intervals, or adding adjuncts like entacapone.',
bd:{a:'❌ Peak-dose dyskinesia occurs at peak drug concentration, not at end-of-dose. Symptoms here are return of tremors, not involuntary movements.',b:'❌ The on-off phenomenon is UNPREDICTABLE and has no reliable relationship to dosing timing — this scenario is predictable and dose-related.',c:'✅ Predictable return of symptoms before the next dose = wearing-off effect. The pattern (every afternoon) and relationship to dosing confirm this.',d:'❌ The client is experiencing symptom return, not toxicity. Toxicity presents with excessive dopaminergic effects, not Parkinson\'s symptom breakthrough.'},
mem:'⏰ Wearing-off = PREDICTABLE end-of-dose failure. On-Off = UNPREDICTABLE light switch. The key word is PREDICTABLE — if you can set a clock to when symptoms return, it\'s wearing-off! Fix: adjust dose intervals or add entacapone.'},

{id:9,type:'matrix',drug:'Carbidopa/Levodopa',tag:"Parkinson's",
stem:'The nurse is caring for a client who was started on carbidopa/levodopa 48 hours ago. For each client finding, indicate whether it represents an <strong>Expected Response</strong> or an <strong>Unexpected Response</strong> requiring follow-up.',
cols:['Expected Response','Unexpected — Requires Follow-Up'],
rows:[
{t:'Client reports mild nausea after taking the morning dose with a small amount of water',c:0},
{t:'Client appears more alert and engaged but states tremors are not yet improved',c:0},
{t:'Client\'s blood pressure drops from 128/82 to 92/58 mmHg when moving from lying to standing',c:1},
{t:'Client reports auditory hallucinations — hearing voices that are not present',c:1},
{t:'Client notes slight darkening of urine that began two days after starting the medication',c:0},
{t:'Client\'s spouse reports the client purchased $4,000 worth of lottery tickets online overnight',c:1}
],
rat:'<strong>Rows 1, 2, and 5 are expected. Rows 3, 4, and 6 require follow-up.</strong> Nausea, slow therapeutic onset, and darkened urine are expected early findings. A 36-point drop in systolic BP (orthostatic hypotension) is a significant adverse effect requiring provider notification and fall precautions. Hallucinations represent a serious CNS adverse effect. Compulsive buying behavior, while more classic for dopamine agonists, can also occur with levodopa — any impulsive behavior warrants provider notification.',
bd:{row0:'Expected — Nausea is a common early adverse effect; taking with food can help.',row1:'Expected — Full benefit takes weeks to months; early alertness is a reasonable early response.',row2:'Unexpected — A drop to 92/58 with position change is symptomatic orthostatic hypotension — fall risk and provider notification needed.',row3:'Unexpected — Hallucinations are a serious CNS adverse effect requiring provider evaluation.',row4:'Expected — Darkened urine is a benign metabolite effect of levodopa.',row5:'Unexpected — Compulsive behaviors (gambling, spending) can occur with dopaminergic therapy and require immediate provider notification.'},
mem:'🔴 Orthostatic hypotension + hallucinations + compulsive behaviors = CALL THE PROVIDER. Nausea + dark urine + slow improvement = EXPECTED. The pattern: anything involving the brain or the BP warrants a second look.'},

{id:10,type:'bowtie',drug:'Carbidopa/Levodopa',tag:"Parkinson's",
stem:'A client with Parkinson\'s disease who takes carbidopa/levodopa three times daily is admitted to the medical unit for a hip fracture repair. The surgical team plans to hold ALL oral medications for 24 hours postoperatively due to NPO status. The nurse on the medical-surgical unit is aware of a potentially serious complication.',
cond:{label:'The nurse recognizes the client is at risk for:',opts:[
{id:'c1',text:'Neuroleptic malignant-like syndrome (NMS-like) from abrupt withdrawal of dopaminergic medications',correct:true},
{id:'c2',text:'Hypertensive crisis from accumulated levodopa in the bloodstream during the NPO period'},
{id:'c3',text:'Dyskinesias secondary to rebound dopamine accumulation when oral intake is resumed'},
{id:'c4',text:'Respiratory failure from cholinergic rebound after stopping carbidopa/levodopa'}
]},
acts:{label:'Actions to take (Select 2):',opts:[
{id:'a1',text:'Contact the provider or surgical team to discuss alternative routes of administration or prioritizing reinstatement of carbidopa/levodopa postoperatively',correct:true},
{id:'a2',text:'Hold all Parkinson\'s medications per the NPO order without further assessment or communication'},
{id:'a3',text:'Document the concern and advocate for the client by communicating the risk of abrupt levodopa withdrawal to the surgical team',correct:true},
{id:'a4',text:'Administer a double dose of carbidopa/levodopa once NPO is lifted to compensate for missed doses'}
]},
params:{label:'Parameters to monitor (Select 2):',opts:[
{id:'p1',text:'Temperature and neuromuscular rigidity as early indicators of NMS-like response',correct:true},
{id:'p2',text:'Level of consciousness and cognitive status for acute changes consistent with withdrawal',correct:true},
{id:'p3',text:'Serum potassium levels for hypokalemia related to the NPO period'},
{id:'p4',text:'Urine output for fluid retention caused by halted dopamine activity'}
]},
rat:'Abrupt withdrawal of carbidopa/levodopa — even for 24 hours — can precipitate an <strong>NMS-like syndrome</strong> characterized by hyperthermia, severe muscle rigidity, altered consciousness, and autonomic instability. This is a medical emergency. The nurse must advocate for the client by notifying the surgical team and ensuring a plan to minimize the medication gap.',
bd:{cond:'NMS-like syndrome from abrupt levodopa withdrawal is the most clinically significant risk. Fever + rigidity + altered LOC are the hallmarks.',acts:'Proactive communication with the surgical team and documentation/advocacy are the priority actions. Doubling doses is dangerous. Holding without communication is unsafe.',params:'Temperature and rigidity are the cardinal early warning signs of NMS-like syndrome. Cognitive status changes are also important to monitor.'},
mem:'🌡️ Abrupt levodopa stop = NMS-like syndrome risk. Hallmarks: HIGH fever, RIGID muscles, ALTERED level of consciousness. This is an emergency. Always advocate to minimize the medication gap — even a 24-hour hold is dangerous!'},

// ════════════════════════════════════════
// DOPAMINE AGONISTS  Q11–17
// ════════════════════════════════════════
{id:11,type:'mc',drug:'Pramipexole / Ropinirole',tag:"Parkinson's",
stem:'A client taking ropinirole for early Parkinson\'s disease calls the clinic to report falling asleep while driving on the highway and narrowly avoiding a collision. The nurse\'s priority response is to:',
opts:[
{id:'a',text:'Instruct the client to take the medication only at bedtime to minimize daytime sedation while driving'},
{id:'b',text:'Advise the client to avoid driving and other hazardous activities, hold the dose, and contact the provider for evaluation before taking any further doses',correct:true},
{id:'c',text:'Reassure the client that drowsiness is expected and recommend drinking caffeinated beverages before driving'},
{id:'d',text:'Reduce the ropinirole dose by half and instruct the client to monitor alertness for 48 hours'}
],
rat:'<strong>B is correct.</strong> Dopamine agonists cause excessive daytime sleepiness, including sudden-onset sleep attacks, which are a serious safety hazard. The client who experiences a sleep attack while driving must be advised to stop driving immediately, hold the medication, and contact the provider. Independent dose adjustment or stimulant recommendations are not appropriate nursing actions.',
bd:{a:'❌ Shifting timing may help with insomnia but does not prevent sudden daytime sleep attacks — and driving remains dangerous.',b:'✅ Patient safety is the priority. Stop driving, hold the medication, and get provider guidance before resuming.',c:'❌ Caffeine cannot reliably prevent sudden sleep attacks from dopamine agonists. Driving with this adverse effect is dangerous.',d:'❌ Independently reducing the dose is outside nursing scope and does not address the immediate safety issue of driving.'},
mem:'😴 Dopamine agonists + driving = DANGEROUS. Sudden-onset sleep attacks are unpredictable — they cannot be fought with caffeine. The rule: "If you\'ve fallen asleep while driving, stop driving NOW and call the provider BEFORE the next dose."'},

{id:12,type:'mc',drug:'Pramipexole',tag:"Parkinson's",
stem:'A client\'s family member contacts the clinic reporting that their spouse who is prescribed pramipexole has spent over $15,000 gambling online in the past month and is secretive and defensive about it. The client denies having a gambling problem. Which action by the nurse is most appropriate?',
opts:[
{id:'a',text:'Advise the family member that gambling is a personal choice and that the client has the right to privacy regarding their finances'},
{id:'b',text:'Document the family\'s concern and schedule a routine follow-up appointment within 30 days'},
{id:'c',text:'Notify the provider of the behavior, as dopamine agonists are associated with impulse control disorders that require medication evaluation',correct:true},
{id:'d',text:'Reassure the family that compulsive behaviors resolve on their own as the client adjusts to the medication over time'}
],
rat:'<strong>C is correct.</strong> Impulse control disorders — including pathological gambling, hypersexuality, compulsive shopping, and binge eating — are well-documented, serious adverse effects of dopamine agonists. The client\'s lack of insight (denial) is consistent with this adverse effect. The provider must be notified for medication evaluation, as this may require dose reduction or medication change.',
bd:{a:'❌ This is not a lifestyle preference — this is a recognized drug adverse effect causing functional and financial harm that requires clinical action.',b:'❌ A 30-day delay is inappropriate. $15,000 in gambling losses represents a current active harm requiring urgent provider notification.',c:'✅ Impulse control disorders from dopamine agonists require prompt provider notification and medication evaluation.',d:'❌ These behaviors do not resolve with adjustment — they are drug-induced and typically require dose reduction or drug discontinuation.'},
mem:'🎰 Dopamine agonists → reward circuit stimulation → impulse control disorders. Gambling, hypersexuality, binge eating, compulsive shopping. Lack of insight is common — the FAMILY often notices first. Always document and notify the provider immediately!'},

{id:13,type:'sata',drug:'Pramipexole / Ropinirole',tag:"Parkinson's",
stem:'A nurse is planning care for a client newly started on pramipexole for Parkinson\'s disease. Which nursing interventions are appropriate to include in the care plan? <em>Select all that apply.</em>',
opts:[
{id:'a',text:'Implement fall precautions due to postural hypotension and dizziness risk',correct:true},
{id:'b',text:'Educate the client to change positions slowly when moving from lying or sitting to standing',correct:true},
{id:'c',text:'Instruct the client to avoid all driving until the provider clears them after assessing for daytime sedation',correct:true},
{id:'d',text:'Administer pramipexole with a high-protein meal to reduce the risk of nausea'},
{id:'e',text:'Assess for new-onset compulsive behaviors at each follow-up contact',correct:true},
{id:'f',text:'Initiate telemetry monitoring for QT prolongation as a routine precaution'}
],
rat:'<strong>A, B, C, and E are correct.</strong> Fall precautions, position-change education, driving restrictions, and compulsive behavior screening are all appropriate nursing interventions for clients on dopamine agonists. High-protein meal interaction is a concern for levodopa — not specifically pramipexole. Routine telemetry for QT prolongation is not a standard monitoring requirement for pramipexole.',
bd:{a:'✅ Postural hypotension and dizziness are listed adverse effects — fall risk must be addressed.',b:'✅ Slow position changes help prevent orthostatic hypotension-related dizziness and falls.',c:'✅ Daytime sedation and sleep attacks make driving hazardous — this must be addressed before driving resumes.',d:'❌ Protein interaction is specific to levodopa absorption, not pramipexole mechanism.',e:'✅ Impulse control disorders require ongoing surveillance at each contact.',f:'❌ QT prolongation monitoring is not a standard requirement for pramipexole.'},
mem:'🏥 Pramipexole care plan must-haves: Falls precautions, slow position changes, no driving assessment, compulsive behavior screening. The protein concern belongs to LEVODOPA, not dopamine agonists!'},

{id:14,type:'mc',drug:'Pramipexole / Ropinirole',tag:"Parkinson's",
stem:'A nurse is reviewing the pathophysiology of Parkinson\'s disease with a student. The student asks why some clients with mild Parkinson\'s disease are started on a dopamine agonist rather than carbidopa/levodopa. Which response by the nurse is most accurate?',
opts:[
{id:'a',text:'Dopamine agonists are preferred in older clients because they have fewer cardiac side effects than levodopa'},
{id:'b',text:'Dopamine agonists have a longer duration of action and can be dosed once weekly, improving medication adherence'},
{id:'c',text:'Dopamine agonists are preferred in younger clients to delay levodopa use and reduce long-term dyskinesia risk',correct:true},
{id:'d',text:'Dopamine agonists are preferred in mild disease because they cross the blood-brain barrier more effectively than levodopa'}
],
rat:'<strong>C is correct.</strong> Dopamine agonists are often preferred as first-line therapy in younger clients with mild Parkinson\'s disease specifically to delay initiation of levodopa. Long-term levodopa use carries a higher risk of dyskinesias. By using dopamine agonists initially, the cumulative levodopa exposure is reduced, potentially delaying or reducing dyskinesia development.',
bd:{a:'❌ Older adults are actually more susceptible to the CNS adverse effects of dopamine agonists (hallucinations, confusion). Levodopa may be preferred in the elderly.',b:'❌ Dopamine agonists are not dosed weekly — they require multiple daily doses.',c:'✅ Delaying levodopa in younger patients to reduce long-term dyskinesia risk is the clinical rationale for using dopamine agonists first.',d:'❌ BBB crossing is not the rationale. Dopamine agonists do cross the BBB readily, but this is not why they are preferred in mild disease.'},
mem:'🧑 Young patient + mild PD = Start with dopamine agonist to DELAY levodopa. Why? Long-term levodopa = dyskinesia risk. Save levodopa for when they really need it. Older patients often skip straight to levodopa because dopamine agonists cause MORE CNS problems in the elderly.'},

{id:15,type:'matrix',drug:'Pramipexole',tag:"Parkinson's",
stem:'A nurse has completed discharge teaching for a client prescribed pramipexole. During a follow-up call, the client makes the following statements. For each statement, indicate whether it demonstrates <strong>Effective</strong> or <strong>Ineffective</strong> understanding.',
cols:['Effective Understanding','Ineffective — Needs Reinforcement'],
rows:[
{t:'"I\'ve been getting up slowly from my chair because I\'ve noticed some lightheadedness when I stand quickly"',c:0},
{t:'"I stopped taking pramipexole on my own last week because I felt worse — I figured I\'d restart when I feel ready"',c:1},
{t:'"I told my doctor that I\'ve been having new urges to shop online constantly — I\'ve been buying things I don\'t need every night"',c:0},
{t:'"I\'ve been having some nausea after my doses but I\'m managing it by taking the medication with a small snack"',c:0},
{t:'"The medication should start working fully by the end of this week — I expect my tremors to be gone soon"',c:1},
{t:'"I know this medication controls symptoms but won\'t reverse the underlying disease"',c:0}
],
rat:'<strong>Rows 1, 3, 4, and 6 show effective understanding. Rows 2 and 5 are ineffective.</strong> Stopping pramipexole abruptly without provider guidance is unsafe. Expecting full benefit within one week is incorrect — effects develop over weeks to months. Reporting compulsive behaviors, managing nausea with food, using fall precautions, and maintaining realistic expectations all demonstrate correct teaching integration.',
bd:{row0:'Effective — Slow position change correctly addresses orthostatic hypotension risk.',row1:'Ineffective — Abruptly stopping Parkinson\'s medications without provider guidance is dangerous.',row2:'Effective — Correctly identifying and reporting compulsive behaviors reflects teaching retention.',row3:'Effective — Nausea with food management is appropriate and does not interfere with pramipexole absorption.',row4:'Ineffective — Full benefit takes weeks to months, not days. Expecting tremor elimination is also unrealistic.',row5:'Effective — Realistic expectations about symptom management vs. cure are correctly understood.'},
mem:'📚 Two big ineffective understanding red flags: (1) Stopping meds alone = DANGEROUS, (2) Expecting full results in a week = WRONG. Correct understanding = slow stand, report compulsions, take with snack, stay patient, no cure only control.'},

{id:16,type:'mc',drug:'Pramipexole / Ropinirole',tag:"Parkinson's",
stem:'A client with Parkinson\'s disease who is on ropinirole is being evaluated in the clinic. Vital signs show BP 148/86 mmHg lying, 104/62 mmHg standing. The client reports feeling dizzy and nearly falling twice at home. Which intervention should the nurse prioritize first?',
opts:[
{id:'a',text:'Initiate a dietary sodium restriction and fluid limit to address the blood pressure differential'},
{id:'b',text:'Educate the client on fall prevention strategies and assist with identifying modifications to the home environment to reduce fall risk',correct:true},
{id:'c',text:'Hold ropinirole until the blood pressure values normalize and symptoms resolve without provider notification'},
{id:'d',text:'Schedule a cardiology referral to rule out structural causes of orthostatic hypotension before continuing ropinirole'}
],
rat:'<strong>B is correct.</strong> The BP differential and near-falls indicate symptomatic orthostatic hypotension — a recognized adverse effect of dopamine agonists. The immediate nursing priority is patient safety — fall prevention education and home modification. The provider should also be notified. Holding the medication without provider direction is not appropriate. Sodium/fluid restriction would worsen hypotension.',
bd:{a:'❌ Sodium restriction and fluid limits would worsen orthostatic hypotension — the opposite of the correct intervention.',b:'✅ Fall prevention is the immediate safety priority. The nurse should also notify the provider, but the first action is ensuring the client\'s safety.',c:'❌ Holding medications without provider order is outside nursing scope. The provider must be notified.',d:'❌ A cardiology referral may be appropriate eventually, but the immediate priority is addressing the active fall risk from a known drug adverse effect.'},
mem:'⬆️ Orthostatic hypotension = biggest fall risk from dopamine agonists. BP drops significantly with position change → dizziness → falls → injury. Priority: FALL PREVENTION. Then notify provider. Sodium restriction = wrong direction!'},

{id:17,type:'mc',drug:'Pramipexole / Ropinirole',tag:"Parkinson's",
stem:'A client asks why their provider chose ropinirole instead of carbidopa/levodopa, stating, "My friend with Parkinson\'s takes the other medication and says it works much better." Which nursing response most accurately explains the difference in therapeutic effect profiles?',
opts:[
{id:'a',text:'Ropinirole works by the same mechanism as carbidopa/levodopa but is formulated to cause fewer nausea-related side effects'},
{id:'b',text:'Ropinirole is generally considered less potent than carbidopa/levodopa for motor symptoms but carries a lower risk of dyskinesias with long-term use',correct:true},
{id:'c',text:'Carbidopa/levodopa is less effective because it requires a longer absorption period, while ropinirole works immediately'},
{id:'d',text:'Ropinirole is preferred over carbidopa/levodopa because it has no risk of compulsive behaviors or CNS adverse effects'}
],
rat:'<strong>B is correct.</strong> Dopamine agonists like ropinirole are generally less effective than carbidopa/levodopa for controlling motor symptoms, but they carry a significantly lower risk of dyskinesias over the long term. This trade-off is why they are often chosen as initial therapy in younger patients. The client\'s friend may experience better motor control on levodopa, but with greater long-term risk.',
bd:{a:'❌ They work by completely different mechanisms. Carbidopa/levodopa replaces dopamine; ropinirole directly stimulates receptors.',b:'✅ Less motor efficacy but lower dyskinesia risk is the key trade-off with dopamine agonists vs. levodopa.',c:'❌ Onset of action is not the distinguishing factor. Both require weeks for full effect.',d:'❌ Dopamine agonists have MORE risk of compulsive behaviors and hallucinations than levodopa — this statement is incorrect.'},
mem:'⚖️ Levodopa = STRONGER motor control but higher dyskinesia risk long-term. Dopamine agonists = WEAKER motor control but lower dyskinesia risk. It\'s a trade-off. Young patients often get dopamine agonists FIRST to preserve levodopa\'s power for later.'},

// ════════════════════════════════════════
// ENTACAPONE  Q18–21
// ════════════════════════════════════════
{id:18,type:'mc',drug:'Entacapone',tag:"Parkinson's",
stem:'The nurse is administering medications to a client prescribed carbidopa/levodopa and entacapone. The client asks why entacapone must be given at the same time as carbidopa/levodopa rather than separately. Which explanation is most accurate?',
opts:[
{id:'a',text:'Entacapone requires levodopa to activate its mechanism and cannot work independently'},
{id:'b',text:'Entacapone works in the intestine and peripheral tissues at the time levodopa is present to prevent its premature breakdown, extending the amount that reaches the brain',correct:true},
{id:'c',text:'Entacapone enhances carbidopa\'s ability to cross the blood-brain barrier when the two are administered simultaneously'},
{id:'d',text:'Co-administration is required because entacapone and carbidopa are metabolized by the same hepatic enzyme'}
],
rat:'<strong>B is correct.</strong> Entacapone is a COMT inhibitor that works peripherally in the intestinal wall and tissues to prevent COMT-mediated breakdown of levodopa. Its action is most beneficial when levodopa is actively present in the system — which is why it is given WITH each dose of carbidopa/levodopa rather than as a separate standalone dose.',
bd:{a:'❌ Entacapone does not require activation by levodopa; it independently inhibits COMT enzyme activity.',b:'✅ Peripheral COMT inhibition at the time levodopa is present = more levodopa survives to reach the brain.',c:'❌ Entacapone does not interact with carbidopa\'s BBB mechanism; it acts peripherally on levodopa itself.',d:'❌ Hepatic enzyme competition is not the rationale for co-administration timing.'},
mem:'🔄 Entacapone = "right-time, right-place" drug. COMT breaks down levodopa in the gut and tissues. Entacapone blocks COMT only while levodopa is present. Take together every time = maximum levodopa survival = more reaches the brain.'},

{id:19,type:'sata',drug:'Entacapone',tag:"Parkinson's",
stem:'A nurse is providing discharge teaching to a client newly prescribed entacapone. Which teaching points should the nurse include? <em>Select all that apply.</em>',
opts:[
{id:'a',text:'Urine may take on an orange or brownish discoloration — this is an expected, harmless effect',correct:true},
{id:'b',text:'Entacapone may worsen levodopa-related adverse effects such as dyskinesia or hallucinations due to increased levodopa availability',correct:true},
{id:'c',text:'Entacapone should be taken separately from carbidopa/levodopa to prevent a drug interaction between the two'},
{id:'d',text:'Entacapone can be safely combined with non-selective MAO inhibitors without additional dietary precautions'},
{id:'e',text:'Diarrhea is a known adverse effect that, if persistent, should be reported to the provider',correct:true},
{id:'f',text:'The medication is intended to extend the duration of carbidopa/levodopa, reducing "wearing-off" between doses',correct:true}
],
rat:'<strong>A, B, E, and F are correct.</strong> Orange urine discoloration is expected and benign. Because entacapone increases the effective amount of levodopa, existing levodopa adverse effects (dyskinesia, hallucinations) may worsen and should be monitored. Diarrhea is a GI adverse effect. The clinical purpose of entacapone is to extend levodopa duration. Entacapone must be taken WITH each levodopa dose, not separately. MAOI combinations with entacapone carry risk — dietary precautions and provider consultation are needed.',
bd:{a:'✅ Orange/brown urine is expected and benign — proactive teaching prevents unnecessary alarm.',b:'✅ More levodopa reaching the brain means dopaminergic adverse effects can intensify.',c:'❌ Entacapone is specifically administered WITH each dose of carbidopa/levodopa.',d:'❌ Combining entacapone with non-selective MAOIs is potentially dangerous due to excessive catecholamine activity.',e:'✅ Diarrhea is a listed GI adverse effect requiring provider notification if persistent.',f:'✅ Reducing wearing-off and extending levodopa duration is the primary therapeutic goal of entacapone.'},
mem:'🟠 Entacapone teaching: "More levodopa = more ADRs possible." Orange urine = fine. Diarrhea = report if persistent. Take WITH each levodopa dose. MAOIs = dangerous combination. If dyskinesias worsen after adding entacapone, it\'s working TOO well — provider needs to reduce levodopa dose!'},

{id:20,type:'mc',drug:'Entacapone',tag:"Parkinson's",
stem:'A client is prescribed entacapone as an add-on therapy for Parkinson\'s disease. Two weeks after starting the medication, the client calls to report that their involuntary arm movements have become significantly worse since starting the new drug. The nurse correctly interprets this finding as:',
opts:[
{id:'a',text:'An allergic reaction to entacapone requiring immediate discontinuation and evaluation'},
{id:'b',text:'A sign that entacapone is ineffective and the client requires a different COMT inhibitor'},
{id:'c',text:'A predictable consequence of increased levodopa bioavailability, suggesting the carbidopa/levodopa dose may need reduction',correct:true},
{id:'d',text:'An indication that the client is not absorbing entacapone properly and the dose should be increased'}
],
rat:'<strong>C is correct.</strong> Worsening dyskinesias after adding entacapone are a direct and predictable consequence of the drug working as intended — more levodopa is now reaching the brain, and this increased dopaminergic stimulation can intensify existing levodopa-related dyskinesias. The appropriate clinical response is to reduce the carbidopa/levodopa dose, not to discontinue entacapone.',
bd:{a:'❌ This is not an allergic reaction; worsening dyskinesia is a pharmacodynamic effect, not an immune response.',b:'❌ The drug is working — the result is increased levodopa effect. This is evidence of efficacy, not failure.',c:'✅ Dyskinesias worsen because MORE levodopa is reaching the brain. Fix: reduce the levodopa dose, not the entacapone.',d:'❌ The problem is too much effectiveness, not inadequate absorption. Increasing the dose would worsen dyskinesias further.'},
mem:'⚠️ Entacapone works = more levodopa in the brain = dyskinesias can WORSEN. This is expected and manageable — reduce the levodopa dose. Don\'t stop entacapone! Think: "If dyskinesias worsen, you gave too much dopamine — turn the levodopa down."'},

{id:21,type:'mc',drug:'Entacapone',tag:"Parkinson's",
stem:'The nurse is caring for a client on carbidopa/levodopa and entacapone who develops a new onset of profuse sweating, confusion, and an elevated temperature of 39.8°C (103.6°F). The client has no documented infection. Which action should the nurse take first?',
opts:[
{id:'a',text:'Administer acetaminophen per protocol and continue monitoring vital signs every four hours'},
{id:'b',text:'Assess the client\'s recent medication history and notify the provider of the findings immediately',correct:true},
{id:'c',text:'Apply cooling blankets to reduce the temperature and reassess the client in two hours'},
{id:'d',text:'Obtain blood cultures and initiate empiric antibiotics based on infection protocol'}
],
rat:'<strong>B is correct.</strong> This presentation — confusion, diaphoresis, and hyperthermia without documented infection — raises concern for a drug-related syndrome, potentially NMS-like syndrome (if medications were recently changed or discontinued) or serotonin syndrome (if serotonergic agents are involved). The nurse\'s FIRST action is to gather a complete medication history and notify the provider to determine the cause before initiating symptomatic treatment.',
bd:{a:'❌ Treating the symptom (fever) before identifying the cause is not the priority. The underlying drug interaction or withdrawal must be identified first.',b:'✅ The nurse must act like a detective — gather medication history and notify the provider before any symptomatic treatment. The cause must be identified.',c:'❌ Cooling is a symptomatic measure and should not precede identifying the cause of the hyperthermia.',d:'❌ No infection is documented. Initiating antibiotics empirically before determining the cause is premature and potentially harmful.'},
mem:'🕵️ Mystery fever + confusion + diaphoresis on a complex regimen = MEDICATION HISTORY FIRST. Always ask: "What changed?" Was a drug added, stopped, or missed? NMS-like syndrome and serotonin syndrome both present this way. Assess → Notify BEFORE treating symptoms!'},

// ════════════════════════════════════════
// SELEGILINE  Q22–27
// ════════════════════════════════════════
{id:22,type:'mc',drug:'Selegiline',tag:"Parkinson's",
stem:'A client with Parkinson\'s disease who takes selegiline 10 mg daily is seen in the clinic with a blood pressure of 196/112 mmHg, a pounding headache rated 10/10, and diaphoresis. The client reports eating a dinner of aged cheese, salami, and red wine the previous evening. The nurse recognizes this presentation is consistent with:',
opts:[
{id:'a',text:'A hypertensive emergency secondary to tyramine-triggered norepinephrine release with high-dose, non-selective MAO inhibition',correct:true},
{id:'b',text:'Serotonin syndrome triggered by the dietary tryptophan content in aged cheese and fermented foods'},
{id:'c',text:'An autonomic dysreflexia episode unrelated to the selegiline therapy'},
{id:'d',text:'Peak-dose levodopa toxicity potentiated by the concurrent dietary intake of tyramine'}
],
rat:'<strong>A is correct.</strong> At higher doses, selegiline loses its selectivity for MAO-B and begins to inhibit both MAO-A and MAO-B. MAO-A normally breaks down tyramine in the gut. When tyramine-rich foods (aged cheese, cured meats, wine) are consumed and MAO is inhibited, tyramine enters the bloodstream, triggering massive norepinephrine release and hypertensive crisis.',
bd:{a:'✅ High-dose selegiline = non-selective MAOI activity → tyramine accumulates → norepinephrine surge → hypertensive crisis.',b:'❌ Serotonin syndrome is triggered by serotonergic agents (SSRIs + MAOIs), not by dietary tryptophan in the absence of serotonergic drugs.',c:'❌ Autonomic dysreflexia occurs in clients with spinal cord injuries, not in Parkinson\'s disease patients as a drug reaction.',d:'❌ Levodopa toxicity would present with excessive dopaminergic symptoms (dyskinesias, hallucinations) — not hypertensive crisis.'},
mem:'🧀 High-dose selegiline = loses MAO-B selectivity = becomes a full MAOI. Tyramine-rich foods (aged cheese, cured meats, wine) + full MAOI = HYPERTENSIVE CRISIS. Teach: "At high doses, treat selegiline like a full MAOI — avoid ALL tyramine foods!"'},

{id:23,type:'mc',drug:'Selegiline',tag:"Parkinson's",
stem:'A client is prescribed selegiline 5 mg orally twice daily for early Parkinson\'s disease. The nurse provides medication teaching. Which client statement requires the nurse to provide additional education?',
opts:[
{id:'a',text:'"I will take my second dose before noon to avoid having trouble sleeping at night"'},
{id:'b',text:'"I know this medication can be combined with my levodopa if needed later in my treatment"'},
{id:'c',text:'"I should be able to take my prescription tramadol for back pain safely alongside this medication"',correct:true},
{id:'d',text:'"I understand that at higher doses I would need to watch what I eat more carefully"'}
],
rat:'<strong>C requires additional education.</strong> Tramadol is a serotonergic opioid that also has weak MAO inhibitory properties. Combining tramadol with selegiline (an MAO inhibitor) carries risk of serotonin syndrome. The other statements are all accurate: before-noon dosing prevents insomnia, selegiline can be combined with levodopa, and high-dose selegiline requires tyramine dietary caution.',
bd:{a:'✅ Correct — before-noon dosing is specifically recommended to prevent CNS excitation-related insomnia.',b:'✅ Correct — selegiline is used as an adjunct to levodopa therapy.',c:'❌ Incorrect client statement — tramadol + selegiline risks serotonin syndrome due to combined serotonergic activity.',d:'✅ Correct — high-dose selegiline loses MAO-B selectivity, requiring tyramine dietary precautions.'},
mem:'💊 Selegiline + Opioids = DANGER. Specifically: tramadol + selegiline = serotonin syndrome risk. Meperidine (Demerol) is a complete contraindication with all MAOIs. Even though selegiline is "just" MAO-B, opioids are always a concern. Always check the pain med list!'},

{id:24,type:'sata',drug:'Selegiline',tag:"Parkinson's",
stem:'The nurse is reviewing priority discharge teaching for a client newly started on selegiline. Which points are most important to include? <em>Select all that apply.</em>',
opts:[
{id:'a',text:'Administer morning and midday doses — avoid late afternoon or evening administration to prevent insomnia',correct:true},
{id:'b',text:'Report symptoms of serotonin toxicity such as agitation, fever, muscle twitching, or rapid heart rate, particularly if starting any new medications',correct:true},
{id:'c',text:'Selegiline can be combined with any antidepressant to treat concurrent depression in Parkinson\'s disease'},
{id:'d',text:'At standard doses, tyramine dietary restrictions are generally less critical but become essential if the dose is increased',correct:true},
{id:'e',text:'Selegiline may slow disease progression in addition to providing symptomatic benefit, though this has not been definitively proven',correct:true},
{id:'f',text:'Avoid grapefruit juice when taking selegiline to prevent significant drug accumulation in the bloodstream'}
],
rat:'<strong>A, B, D, and E are correct.</strong> Timing before noon prevents insomnia. Reporting signs of serotonin syndrome is critical — especially if antidepressants or other serotonergic drugs are prescribed. Tyramine restriction is dose-dependent. Selegiline may have neuroprotective properties (though not definitively proven). Not all antidepressants are safe — SSRIs and certain opioids carry serotonin syndrome risk. Grapefruit juice interaction with selegiline is not a documented teaching priority.',
bd:{a:'✅ Before noon is the specific timing recommendation to prevent CNS excitation-related insomnia.',b:'✅ Serotonin syndrome surveillance is critical given the interaction with SSRIs and opioids.',c:'❌ SSRIs combined with selegiline carry serotonin syndrome risk — this statement is incorrect and dangerous.',d:'✅ Standard low doses = MAO-B selective = minimal tyramine concern. High doses = non-selective = tyramine restriction needed.',e:'✅ Selegiline is thought to have potential neuroprotective effects, though definitive proof is lacking.',f:'❌ Grapefruit-selegiline interaction is not a documented priority teaching point.'},
mem:'🕛 Selegiline teaching priorities: (1) BEFORE NOON — no exceptions. (2) No SSRIs or risky opioids without provider guidance. (3) Tyramine = low concern at low dose, HIGH concern at high dose. (4) May slow progression — maybe. (5) Report fever + agitation + twitching immediately.'},

{id:25,type:'mc',drug:'Selegiline',tag:"Parkinson's",
stem:'A client with Parkinson\'s disease on selegiline is admitted with severe low back pain and rated it 8/10. The nurse reviews the client\'s allergy and medication record before administering analgesics. Which analgesic order should the nurse question before administering?',
opts:[
{id:'a',text:'Ketorolac (Toradol) 15 mg IV every 6 hours as needed'},
{id:'b',text:'Meperidine (Demerol) 50 mg IV every 4 hours as needed for severe pain',correct:true},
{id:'c',text:'Acetaminophen 650 mg orally every 6 hours scheduled'},
{id:'d',text:'Ibuprofen 400 mg orally every 8 hours as needed'}
],
rat:'<strong>B should be questioned.</strong> Meperidine is absolutely contraindicated with all MAO inhibitors, including selegiline. The combination risks a life-threatening interaction including hyperthermia, hypertension or hypotension, coma, and potentially serotonin syndrome. Ketorolac (NSAID), acetaminophen, and ibuprofen do not carry this interaction and are safer alternatives for pain management.',
bd:{a:'✅ Ketorolac is an NSAID with no documented MAO inhibitor interaction — no concern.',b:'❌ CRITICAL — meperidine + any MAOI = life-threatening interaction. This order must be questioned before administration.',c:'✅ Acetaminophen has no MAO inhibitor interaction and is safe.',d:'✅ Ibuprofen has no MAO inhibitor interaction relevant to this concern.'},
mem:'🚫 Meperidine + MAOIs = ABSOLUTE contraindication. Every. Single. Time. This is one of the highest-yield drug interactions in pharmacology. When you see selegiline on the MAR, mentally flag: "NO MEPERIDINE." Also remember: tramadol, SSRIs, and other serotonergic drugs carry risk — but meperidine is the hardest NO.'},

{id:26,type:'mc',drug:'Selegiline',tag:"Parkinson's",
stem:'A client newly prescribed selegiline asks why they cannot simply take it in the evening with dinner to make it easier to remember. Which nurse response best explains the clinical rationale for the timing restriction?',
opts:[
{id:'a',text:'Selegiline must be taken with dinner because food significantly increases its absorption and therapeutic effectiveness'},
{id:'b',text:'Evening administration increases the risk of dangerous blood pressure fluctuations during sleep when monitoring is reduced'},
{id:'c',text:'Selegiline causes CNS excitation that can interfere with sleep when administered late in the day, so morning and midday timing is recommended',correct:true},
{id:'d',text:'Selegiline\'s half-life requires precise 12-hour dosing intervals that can only be achieved with morning and noon administration'}
],
rat:'<strong>C is correct.</strong> Selegiline causes CNS excitation as a documented adverse effect. If taken in the afternoon or evening, this excitation disrupts sleep onset and sleep quality. The specific recommendation is to administer selegiline before noon to prevent insomnia.',
bd:{a:'❌ Food does not specifically increase selegiline absorption to a clinically meaningful degree requiring meal timing.',b:'❌ Blood pressure fluctuations during sleep are not the primary reason for the timing restriction.',c:'✅ CNS excitation from selegiline disrupts sleep when taken late in the day — before noon is the specific recommendation.',d:'❌ Selegiline\'s timing is based on CNS adverse effects, not a strict pharmacokinetic half-life calculation.'},
mem:'☀️ Selegiline = "Morning Drug Only." The dopamine boost is STIMULATING. Take it late = awake all night. Think of it like caffeine — you wouldn\'t drink a triple espresso at 8 PM. Before NOON = key teaching point that will absolutely be on your exam.'},

{id:27,type:'mc',drug:'Selegiline',tag:"Parkinson's",
stem:'A client on selegiline for Parkinson\'s disease is started on fluoxetine by their psychiatrist for major depressive disorder. Two days later, the client presents to the emergency department with agitation, diaphoresis, muscle rigidity, temperature 40.1°C, and HR of 138 bpm. Which condition does the nurse suspect?',
opts:[
{id:'a',text:'Neuroleptic malignant syndrome caused by dopamine depletion from the addition of fluoxetine'},
{id:'b',text:'Serotonin syndrome caused by combined serotonergic excess from selegiline and fluoxetine',correct:true},
{id:'c',text:'Anticholinergic toxicity caused by fluoxetine\'s anticholinergic properties reacting with selegiline'},
{id:'d',text:'Tyramine-induced hypertensive crisis triggered by the fluoxetine metabolism pathway'}
],
rat:'<strong>B is correct.</strong> Fluoxetine (SSRI) increases serotonin availability. Selegiline inhibits MAO-B (and at relevant clinical doses, some MAO-A), reducing serotonin breakdown. The combination leads to excessive serotonergic stimulation — serotonin syndrome. Classic presentation: agitation, diaphoresis, hyperthermia, tachycardia, and muscle rigidity (often with hyperreflexia and clonus).',
bd:{a:'❌ NMS involves dopamine depletion and antipsychotic use. Fluoxetine is not a dopamine antagonist, and selegiline increases dopamine.',b:'✅ SSRI + selegiline (MAOI) = excess serotonin = serotonin syndrome. Classic presentation matches.',c:'❌ Fluoxetine is not primarily anticholinergic. Anticholinergic toxicity presents with dry skin, urinary retention, and mydriasis — not diaphoresis and rigidity.',d:'❌ Tyramine crisis requires tyramine-containing food intake, not the addition of an SSRI.'},
mem:'🌡️ Serotonin Syndrome Signs: "Hot, Wet, Twitchy, and Fast." Hot = fever. Wet = diaphoresis. Twitchy = muscle rigidity/clonus. Fast = tachycardia. Cause: SSRI + MAOI = too much serotonin. Selegiline is the MAOI here. Never combine!'},

// ════════════════════════════════════════
// AMANTADINE  Q28–33
// ════════════════════════════════════════
{id:28,type:'mc',drug:'Amantadine',tag:"Parkinson's",
stem:'A client with Parkinson\'s disease is prescribed amantadine. After two weeks, the client\'s daughter calls to report that the client\'s legs and arms show a purplish-red, mottled, net-like skin discoloration, but the client reports no pain, swelling, or numbness. The nurse\'s priority response is to:',
opts:[
{id:'a',text:'Advise the daughter to apply warm compresses to the affected areas and monitor for resolution over 48 hours'},
{id:'b',text:'Instruct the daughter to take the client to the emergency department immediately for evaluation of a potential blood clot'},
{id:'c',text:'Document the finding, notify the provider, and reassure the client that livedo reticularis is a known adverse effect of amantadine',correct:true},
{id:'d',text:'Instruct the client to hold amantadine until a dermatology consultation can be completed within the week'}
],
rat:'<strong>C is correct.</strong> Livedo reticularis — a purplish, mottled, net-like discoloration of the skin — is a known, specific adverse effect of amantadine. It is benign and cosmetically concerning but not dangerous. The nurse should notify the provider and document the finding, but the client does not need emergency evaluation or immediate medication discontinuation.',
bd:{a:'❌ Warm compresses treat other skin conditions and won\'t resolve a drug-induced phenomenon; this also doesn\'t notify the provider.',b:'❌ While DVT should always be considered, the described pattern (net-like, mottled, without pain or swelling) is classic livedo reticularis — not DVT.',c:'✅ Livedo reticularis is a documented adverse effect of amantadine. Notify provider and document; no emergency intervention needed.',d:'❌ Holding the medication without provider direction is outside nursing scope and may not even be necessary for this benign finding.'},
mem:'🟣 Livedo reticularis = "Net-like purple mottling" = AMANTADINE\'s signature skin finding. It looks alarming but is benign. If you see a weird purplish net-pattern on skin in a Parkinson\'s patient — think amantadine first. Notify, document, reassure.'},

{id:29,type:'sata',drug:'Amantadine',tag:"Parkinson's",
stem:'The nurse is completing an assessment on a client who has been taking amantadine for one month. Which findings should prompt the nurse to follow up? <em>Select all that apply.</em>',
opts:[
{id:'a',text:'Client is oriented to person, place, and time but reports having vivid dreams and feeling confused upon waking',correct:true},
{id:'b',text:'Client reports difficulty starting urination and a sense of incomplete bladder emptying',correct:true},
{id:'c',text:'Client\'s vision has become blurry when reading, requiring the client to hold books further away',correct:true},
{id:'d',text:'Client reports improved energy and fewer episodes of freezing since starting the medication'},
{id:'e',text:'Client\'s mouth is significantly dry and they are drinking 10 glasses of water per day to compensate',correct:true},
{id:'f',text:'Client reports feeling anxious and restless, which is new since starting the medication',correct:true}
],
rat:'<strong>A, B, C, E, and F require follow-up.</strong> Confusion (even upon waking), urinary retention, blurred vision, dry mouth (indicating anticholinergic-like effects), and new anxiety are all listed adverse effects of amantadine. Improved energy and reduced freezing are therapeutic responses — expected and desirable.',
bd:{a:'✅ Confusion is an adverse effect — even morning confusion or vivid dreams warrant provider follow-up.',b:'✅ Urinary retention is a listed anticholinergic-like adverse effect of amantadine.',c:'✅ Blurred vision is a listed adverse effect requiring follow-up.',d:'❌ Improved energy and reduced freezing episodes are therapeutic responses — no follow-up needed.',e:'✅ Excessive dry mouth indicates significant anticholinergic-like adverse effect requiring provider notification.',f:'✅ Anxiety and restlessness are listed CNS adverse effects of amantadine.'},
mem:'💊 Amantadine ADRs = "CLABUD" — Confusion, Lightheadedness, Anxiety, Blurred vision, Urinary retention, Dry mouth. These overlap with anticholinergic effects because amantadine has anticholinergic-like activity. Improved freezing = GOOD. The CLABUD findings = FOLLOW-UP.'},

{id:30,type:'mc',drug:'Amantadine',tag:"Parkinson's",
stem:'A nurse is caring for a client with Parkinson\'s disease who has been on carbidopa/levodopa for four years and has developed significant dyskinesias. The provider adds amantadine to the regimen. The nurse understands this combination is most appropriate because amantadine:',
opts:[
{id:'a',text:'Inhibits dopamine breakdown by blocking COMT, effectively reducing peak levodopa concentrations and smoothing dyskinesias'},
{id:'b',text:'Blocks NMDA glutamate receptors and increases dopamine availability, which reduces levodopa-induced dyskinesias',correct:true},
{id:'c',text:'Reduces the activity of acetylcholine at muscarinic receptors, which counteracts the involuntary movements caused by excess dopamine'},
{id:'d',text:'Directly stimulates D1 dopamine receptors to counterbalance the D2 receptor overstimulation that underlies dyskinesia'}
],
rat:'<strong>B is correct.</strong> Amantadine has two relevant mechanisms: it promotes dopamine release from presynaptic neurons and blocks NMDA glutamate receptors. The NMDA receptor antagonism is believed to underlie its anti-dyskinesia effect. It is specifically indicated to reduce levodopa-induced dyskinesias.',
bd:{a:'❌ COMT inhibition is the mechanism of entacapone, not amantadine. COMT inhibitors would increase levodopa levels, potentially worsening dyskinesias.',b:'✅ NMDA antagonism + dopamine release/reuptake inhibition = the dual mechanism that makes amantadine effective against levodopa-induced dyskinesias.',c:'❌ Anticholinergic mechanism reduces tremor and rigidity; it does not specifically address levodopa-induced dyskinesias.',d:'❌ Amantadine does not directly stimulate D1 receptors as its primary mechanism.'},
mem:'🔑 Amantadine = two jobs: (1) Releases dopamine and blocks reuptake, (2) Blocks NMDA receptors. Job #2 is what treats dyskinesias! The NMDA block is the anti-dyskinesia key. Amantadine is also memantine\'s cousin — both are NMDA antagonists!'},

{id:31,type:'mc',drug:'Amantadine',tag:"Parkinson's",
stem:'A client taking amantadine for Parkinson\'s disease is scheduled for a follow-up visit. Prior to the appointment, the provider\'s office receives a call from the client\'s caregiver reporting that the client has been increasingly confused and disoriented over the past two days. The caregiver also reports the client recently started a new over-the-counter sleep aid. Which medication is most likely contributing to the confusion?',
opts:[
{id:'a',text:'Melatonin, which interacts with dopaminergic receptors and alters amantadine metabolism'},
{id:'b',text:'Diphenhydramine (Benadryl), which has anticholinergic properties that are additive with amantadine\'s anticholinergic-like effects',correct:true},
{id:'c',text:'Valerian root, which inhibits amantadine absorption and causes breakthrough Parkinson\'s symptoms'},
{id:'d',text:'Zinc lozenges, which compete with amantadine at NMDA receptors and enhance CNS toxicity'}
],
rat:'<strong>B is correct.</strong> Diphenhydramine is a widely available OTC antihistamine with significant anticholinergic activity. Amantadine itself has anticholinergic-like adverse effects. When combined, the anticholinergic burden is additive — leading to confusion, disorientation, urinary retention, and blurred vision, particularly in older adults.',
bd:{a:'❌ Melatonin does not significantly interact with amantadine\'s dopaminergic mechanism or its metabolism.',b:'✅ Diphenhydramine + amantadine = additive anticholinergic effect = confusion and cognitive impairment, especially in the elderly.',c:'❌ Valerian root is not documented to significantly inhibit amantadine absorption.',d:'❌ Zinc lozenges do not have a documented pharmacological interaction with amantadine at NMDA receptors.'},
mem:'💊 OTC sleep aids (diphenhydramine/Benadryl) are anticholinergic. Amantadine is anticholinergic-like. Add them together in an elderly patient = CONFUSION. Always ask: "Are you taking anything over the counter?" Benadryl for sleep is one of the most common hidden anticholinergic exposures!'},

{id:32,type:'mc',drug:'Amantadine',tag:"Parkinson's",
stem:'A client with Parkinson\'s disease is taking amantadine and has a history of chronic kidney disease (CKD) stage 3 with an eGFR of 42 mL/min. The nurse reviews the medication order and is concerned because:',
opts:[
{id:'a',text:'Amantadine requires renal metabolism and CKD accelerates its breakdown, reducing therapeutic blood levels'},
{id:'b',text:'Amantadine is renally excreted and reduced kidney function can lead to drug accumulation and increased toxicity risk',correct:true},
{id:'c',text:'CKD causes potassium retention that interacts with amantadine\'s sodium channel blocking properties'},
{id:'d',text:'Amantadine is nephrotoxic at therapeutic doses and will accelerate the progression of stage 3 CKD to stage 4'}
],

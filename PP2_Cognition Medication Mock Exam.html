{id:59,type:'bowtie',drug:'Multiple Agents',tag:'Clinical Integration',
stem:'A 68-year-old client with Parkinson\'s disease is brought to the ED by a family member. The family reports the client was started on haloperidol four days ago by a new psychiatrist for behavioral symptoms. Since then, the client\'s Parkinson\'s symptoms have become dramatically worse — the client now has severe rigidity, is barely able to walk, and cannot button clothing. Current medications also include carbidopa/levodopa and selegiline.',
cond:{label:'The nurse concludes the most likely cause of the acute deterioration is:',opts:[
{id:'c1',text:'Haloperidol opposing the therapeutic mechanism of carbidopa/levodopa by blocking dopamine receptors',correct:true},
{id:'c2',text:'Selegiline interacting with haloperidol to cause severe extrapyramidal symptoms via MAO pathway activation'},
{id:'c3',text:'Serotonin syndrome caused by the combination of haloperidol and selegiline'},
{id:'c4',text:'Progression of Parkinson\'s disease that coincidentally aligned with the timing of the medication change'}
]},
acts:{label:'Priority actions to take (Select 2):',opts:[
{id:'a1',text:'Contact the prescribing psychiatrist and neurology provider to discuss the haloperidol\'s pharmacodynamic opposition to carbidopa/levodopa',correct:true},
{id:'a2',text:'Hold carbidopa/levodopa to reduce the drug interaction burden until the haloperidol is cleared from the system'},
{id:'a3',text:'Document the clinical timeline correlating haloperidol initiation with symptom worsening and advocate for medication review',correct:true},
{id:'a4',text:'Increase carbidopa/levodopa dosing to overcome the dopamine blockade caused by haloperidol'}
]},
params:{label:'Parameters to monitor (Select 2):',opts:[
{id:'p1',text:'Motor function — assess rigidity, bradykinesia, and ADL performance before and after medication changes',correct:true},
{id:'p2',text:'Temperature and muscle rigidity for early signs of neuroleptic malignant syndrome given the antipsychotic use',correct:true},
{id:'p3',text:'INR for coagulopathy risk in a client on multiple neurological medications'},
{id:'p4',text:'Serum sodium levels for hyponatremia secondary to dopaminergic stimulation'}
]},
rat:'<strong>Haloperidol is blocking dopamine receptors</strong> — the same receptors that carbidopa/levodopa is trying to stimulate. This direct pharmacological opposition dramatically worsens Parkinson\'s motor symptoms. Additionally, antipsychotic use in Parkinson\'s patients carries a risk of neuroleptic malignant syndrome (NMS), which requires vigilant monitoring.',
bd:{cond:'Haloperidol = D2 blocker. Carbidopa/levodopa = D2 stimulator. Direct opposition = Parkinson\'s symptoms worsen dramatically.',acts:'Communication between the prescribing team is critical. Documenting the timeline creates the evidence base for medication change advocacy. Increasing levodopa without addressing the blocker is ineffective. Holding levodopa makes Parkinson\'s worse.',params:'Motor function assessment tracks the clinical impact of the drug interaction. Temperature + rigidity monitoring catches early NMS in a patient on an antipsychotic.'},
mem:'⚔️ The ultimate drug interaction: Antipsychotic (D2 blocker) + Levodopa (D2 stimulator) = Parkinson\'s symptoms EXPLODE. The antipsychotic wins at the receptor level. No amount of levodopa can overcome complete receptor blockade. Plus: antipsychotics in PD = NMS risk. Always screen PD patients\' full medication lists for antipsychotics!'},

{id:60,type:'sata',drug:'Multiple Agents',tag:'Clinical Integration',
stem:'A nurse is preparing to discharge a client with both Parkinson\'s disease and early Alzheimer\'s disease. The client is prescribed carbidopa/levodopa, donepezil, and has a PRN order for diphenhydramine for sleep. Which priority nursing actions should be completed before discharge? <em>Select all that apply.</em>',
opts:[
{id:'a',text:'Educate the client and family that diphenhydramine opposes donepezil\'s mechanism and worsens cognition — and recommend provider review of this PRN order',correct:true},
{id:'b',text:'Review fall risk given that both carbidopa/levodopa and donepezil carry adverse effects that increase fall risk',correct:true},
{id:'c',text:'Reinforce that diphenhydramine is safe for sleep in this client because it is an over-the-counter medication'},
{id:'d',text:'Educate the family that high-protein meals should be spaced away from carbidopa/levodopa doses',correct:true},
{id:'e',text:'Ensure the client and family understand that neither condition will be cured by these medications and clarify realistic therapeutic goals for each drug',correct:true},
{id:'f',text:'Confirm that the client should contact the provider before taking any new OTC medications, including sleep aids, antacids, and antihistamines',correct:true}
],
rat:'<strong>A, B, D, E, and F are correct.</strong> Diphenhydramine (anticholinergic) directly opposes donepezil (cholinergic) and should be flagged for provider review before discharge — not endorsed as safe. Fall risk is heightened by both carbidopa/levodopa (orthostatic hypotension) and donepezil (bradycardia-related dizziness). Protein spacing for levodopa, realistic therapeutic goals, and OTC medication checking are all priority discharge teaching points.',
bd:{a:'✅ Diphenhydramine + donepezil = pharmacological opposition + cognitive worsening in Alzheimer\'s. This PRN order needs provider review before discharge.',b:'✅ Carbidopa/levodopa causes orthostatic hypotension; donepezil causes bradycardia. Both increase fall risk — fall prevention education is priority.',c:'❌ "OTC" does not mean "safe in all situations." Diphenhydramine is specifically problematic in this client given the Alzheimer\'s diagnosis and donepezil therapy.',d:'✅ Protein-levodopa absorption competition is a critical and often forgotten discharge teaching point.',e:'✅ Setting realistic expectations for both conditions prevents frustration, nonadherence, and inappropriate expectations of cure.',f:'✅ OTC medications have significant interactions in Alzheimer\'s and Parkinson\'s care — provider consultation before any new OTC use is essential.'},
mem:'🎓 The ultimate discharge checklist for PD + AD: (1) No diphenhydramine with donepezil. (2) Fall precautions for both conditions. (3) Protein spacing for levodopa. (4) Realistic goals — no cures. (5) Check ALL OTC meds with the provider. These five cover the most high-yield real-world discharge teaching points for this population!'}

]; // END Q array

// ══════════════════════════════
// STATE
// ══════════════════════════════
let cur=0;
let ans=new Array(Q.length).fill(null);
let popIdx=0;
const POPS=[
  {e:'🌟',t:'Outstanding!',s:'Excellent clinical reasoning!'},
  {e:'🎯',t:'Bullseye!',s:'You nailed it — keep going!'},
  {e:'✨',t:'Correct!',s:'Your pharmacology skills are showing!'},
  {e:'🏆',t:'Perfect!',s:'That\'s NCLEX-level thinking right there!'},
  {e:'💜',t:'Yes!',s:'Your cohort would be proud!'},
  {e:'🎉',t:'Right!',s:'Another one down — you\'ve got this!'},
  {e:'🌸',t:'Nailed It!',s:'Hard work is paying off!'},
  {e:'⭐',t:'Brilliant!',s:'Clinical reasoning on point!'},
  {e:'🔥',t:'On Fire!',s:'That\'s exactly the right answer!'},
  {e:'💪',t:'Correct!',s:'Strong nursing judgment!'}
];

function score(){let c=0,w=0;for(let a of ans){if(a!==null){if(a.correct)c++;else w++;}}return{c,w};}

// ══════════════════════════════
// RENDER
// ══════════════════════════════
function render(){
  const q=Q[cur];
  const area=document.getElementById('qa');
  area.innerHTML='';
  const {c,w}=score();
  document.getElementById('qc').textContent=cur+1;
  document.getElementById('cc').textContent=c;
  document.getElementById('wc').textContent=w;
  const tot=c+w;
  document.getElementById('sp').textContent=tot>0?Math.round(c/tot*100)+'%':'—';
  document.getElementById('pf').style.width=((cur+1)/Q.length*100)+'%';

  // dots
  const dotsEl=document.getElementById('dots');
  dotsEl.innerHTML='';
  Q.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='dot';
    if(i===cur)d.classList.add('active');
    if(ans[i]!==null)d.classList.add(ans[i].correct?'acor':'awrg');
    d.onclick=()=>{cur=i;render();};
    dotsEl.appendChild(d);
  });
  document.getElementById('bprev').disabled=cur===0;
  document.getElementById('bnext').disabled=ans[cur]===null;

  const card=document.createElement('div');card.className='card';
  const typeLbl=q.type==='mc'?'Multiple Choice':q.type==='sata'?'SATA':q.type.startsWith('matrix')?'Matrix / Grid':'Bowtie';
  const typeCls=q.type==='mc'?'bmc':q.type==='sata'?'bsata':q.type.startsWith('matrix')?'bmatrix':'bbowtie';
  card.innerHTML=`<div class="qmeta"><span class="qnum">Q${cur+1} / ${Q.length}</span><span class="qbadge ${typeCls}">${typeLbl}</span><span class="dtag">💊 ${q.drug}</span></div>`;
  const stemD=document.createElement('div');stemD.className='stem';stemD.innerHTML=q.stem;card.appendChild(stemD);
  if(q.type==='sata'){const si=document.createElement('div');si.className='sinst';si.textContent='⚠️ Select ALL that apply — you must choose every correct option.';card.appendChild(si);}
  if(q.type==='mc')buildMC(card,q);
  else if(q.type==='sata')buildSATA(card,q);
  else if(q.type==='matrix'||q.type==='matrix3')buildMatrix(card,q,q.type==='matrix3'?3:2);
  else if(q.type==='bowtie')buildBowtie(card,q);
  const br=document.createElement('div');br.className='brow';
  const sb=document.createElement('button');sb.className='bsub';sb.id='sb';sb.textContent='✓ Submit Answer';sb.onclick=()=>submit(q);
  if(ans[cur]!==null)sb.disabled=true;
  br.appendChild(sb);card.appendChild(br);
  area.appendChild(card);
  if(ans[cur]!==null){markAns(q);showRat(q,area);}
}

function buildMC(c,q){
  const d=document.createElement('div');d.className='opts';
  q.opts.forEach(o=>{
    const div=document.createElement('div');div.className='opt';div.dataset.id=o.id;
    div.innerHTML=`<input type="radio" name="mc${q.id}" id="o${o.id}" value="${o.id}"/><label for="o${o.id}">${o.text}</label>`;
    div.onclick=()=>{if(ans[cur]!==null)return;div.querySelector('input').checked=true;};
    d.appendChild(div);
  });
  c.appendChild(d);
}
function buildSATA(c,q){
  const d=document.createElement('div');d.className='opts';
  q.opts.forEach(o=>{
    const div=document.createElement('div');div.className='opt';div.dataset.id=o.id;
    div.innerHTML=`<input type="checkbox" id="o${o.id}" value="${o.id}"/><label for="o${o.id}">${o.text}</label>`;
    d.appendChild(div);
  });
  c.appendChild(d);
}
function buildMatrix(c,q,nc){
  const t=document.createElement('table');t.className='mtbl';
  const th=document.createElement('thead');const hr=document.createElement('tr');
  hr.innerHTML='<th>Finding / Statement</th>';
  q.cols.forEach(col=>hr.innerHTML+=`<th>${col}</th>`);
  th.appendChild(hr);t.appendChild(th);
  const tb=document.createElement('tbody');
  q.rows.forEach((row,ri)=>{
    const tr=document.createElement('tr');tr.dataset.row=ri;
    tr.innerHTML=`<td>${row.t}</td>`;
    for(let ci=0;ci<nc;ci++)tr.innerHTML+=`<td><input type="radio" name="mx${q.id}r${ri}" value="${ci}" data-row="${ri}" data-col="${ci}"/></td>`;
    tb.appendChild(tr);
  });
  t.appendChild(tb);c.appendChild(t);
}
function buildBowtie(c,q){
  const bt=document.createElement('div');bt.className='bt-wrap';
  // Left: Actions
  const ls=document.createElement('div');ls.className='bt-sec';
  ls.innerHTML=`<h4>🔧 Actions to Take</h4><div class="bt-inf">Select exactly 2</div>`;
  q.acts.opts.forEach(o=>{
    const d=document.createElement('div');d.className='bopt';d.dataset.id=o.id;d.dataset.sec='acts';
    d.innerHTML=`<input type="checkbox" id="ba${o.id}" value="${o.id}" data-sec="acts"/><label for="ba${o.id}">${o.text}</label>`;
    ls.appendChild(d);
  });
  const a1=document.createElement('div');a1.className='bt-arr';a1.innerHTML='◀▶';
  // Center: Condition
  const cs=document.createElement('div');cs.className='bt-sec bt-ctr';
  cs.innerHTML=`<h4>🎯 Condition / Cause</h4><div class="bt-inf">Select 1</div><p style="font-size:12px;font-style:italic;color:#6b7280;margin-bottom:10px;">${q.cond.label}</p>`;
  q.cond.opts.forEach(o=>{
    const d=document.createElement('div');d.className='bopt';d.dataset.id=o.id;d.dataset.sec='cond';
    d.innerHTML=`<input type="radio" name="bc${q.id}" id="bc${o.id}" value="${o.id}" data-sec="cond"/><label for="bc${o.id}">${o.text}</label>`;
    cs.appendChild(d);
  });
  const a2=document.createElement('div');a2.className='bt-arr';a2.innerHTML='◀▶';
  // Right: Parameters
  const rs=document.createElement('div');rs.className='bt-sec';
  rs.innerHTML=`<h4>📊 Parameters to Monitor</h4><div class="bt-inf">Select exactly 2</div>`;
  q.params.opts.forEach(o=>{
    const d=document.createElement('div');d.className='bopt';d.dataset.id=o.id;d.dataset.sec='params';
    d.innerHTML=`<input type="checkbox" id="bp${o.id}" value="${o.id}" data-sec="params"/><label for="bp${o.id}">${o.text}</label>`;
    rs.appendChild(d);
  });
  bt.appendChild(ls);bt.appendChild(a1);bt.appendChild(cs);bt.appendChild(a2);bt.appendChild(rs);
  c.appendChild(bt);
}

// ══════════════════════════════
// SUBMIT
// ══════════════════════════════
function submit(q){
  let ok=false,sels=[];
  if(q.type==='mc'){
    const s=document.querySelector(`input[name="mc${q.id}"]:checked`);
    if(!s){alert('Please select an answer.');return;}
    sels=[s.value];ok=q.opts.find(o=>o.id===s.value)?.correct===true;
  }else if(q.type==='sata'){
    sels=[...document.querySelectorAll(`input[type=checkbox]:checked`)].map(e=>e.value);
    if(!sels.length){alert('Select at least one option.');return;}
    const cor=q.opts.filter(o=>o.correct).map(o=>o.id).sort();
    ok=JSON.stringify([...sels].sort())===JSON.stringify(cor);
  }else if(q.type==='matrix'||q.type==='matrix3'){
    const rads=[...document.querySelectorAll('input[type=radio][data-row]')];
    sels=[];let allA=true,allC=true;
    for(let ri=0;ri<q.rows.length;ri++){
      const ch=rads.find(r=>r.dataset.row==ri&&r.checked);
      if(!ch){allA=false;break;}
      sels.push({row:ri,col:parseInt(ch.value)});
      if(parseInt(ch.value)!==q.rows[ri].c)allC=false;
    }
    if(!allA){alert('Please answer all rows.');return;}
    ok=allC;
  }else if(q.type==='bowtie'){
    const ac=[...document.querySelectorAll('input[data-sec="acts"]:checked')].map(e=>e.value);
    const co=[...document.querySelectorAll('input[data-sec="cond"]:checked')].map(e=>e.value);
    const pa=[...document.querySelectorAll('input[data-sec="params"]:checked')].map(e=>e.value);
    if(ac.length!==2||co.length!==1||pa.length!==2){alert('Select 2 actions, 1 condition, 2 parameters.');return;}
    sels={acts:ac,cond:co,params:pa};
    const cAc=q.acts.opts.filter(o=>o.correct).map(o=>o.id).sort();
    const cCo=q.cond.opts.filter(o=>o.correct).map(o=>o.id);
    const cPa=q.params.opts.filter(o=>o.correct).map(o=>o.id).sort();
    ok=JSON.stringify([...ac].sort())===JSON.stringify(cAc)&&co[0]===cCo[0]&&JSON.stringify([...pa].sort())===JSON.stringify(cPa);
  }
  ans[cur]={correct:ok,sels};
  document.getElementById('sb').disabled=true;
  document.getElementById('bnext').disabled=false;
  markAns(q);
  showRat(q,document.getElementById('qa'));
  if(ok)showPop();
  updStats();
}

// ══════════════════════════════
// MARK ANSWERS
// ══════════════════════════════
function markAns(q){
  const a=ans[cur];if(!a)return;
  if(q.type==='mc'){
    document.querySelectorAll('.opt').forEach(d=>{
      d.classList.add('dis');d.querySelector('input').disabled=true;
      const o=q.opts.find(x=>x.id===d.dataset.id);
      if(o?.correct)d.classList.add('cor');
      else if(a.sels.includes(d.dataset.id))d.classList.add('wrg');
    });
  }else if(q.type==='sata'){
    document.querySelectorAll('.opt').forEach(d=>{
      d.classList.add('dis');d.querySelector('input').disabled=true;
      const o=q.opts.find(x=>x.id===d.dataset.id);
      const sel=a.sels.includes(d.dataset.id);
      if(o?.correct&&sel)d.classList.add('cor');
      else if(o?.correct&&!sel)d.classList.add('msd');
      else if(!o?.correct&&sel)d.classList.add('wrg');
    });
  }else if(q.type==='matrix'||q.type==='matrix3'){
    document.querySelectorAll('input[type=radio][data-row]').forEach(r=>r.disabled=true);
    if(a.sels)a.sels.forEach(s=>{
      const tr=document.querySelector(`tr[data-row="${s.row}"]`);
      if(tr)tr.classList.add(s.col===q.rows[s.row].c?'rc':'rw');
    });
  }else if(q.type==='bowtie'){
    document.querySelectorAll('.bopt input').forEach(i=>i.disabled=true);
    document.querySelectorAll('.bopt').forEach(d=>d.classList.add('dis'));
    ['acts','cond','params'].forEach(sec=>{
      const src=sec==='acts'?q.acts.opts:sec==='cond'?q.cond.opts:q.params.opts;
      const sels=a.sels?.[sec]||[];
      src.forEach(o=>{
        const d=document.querySelector(`.bopt[data-id="${o.id}"][data-sec="${sec}"]`);
        if(!d)return;
        const sel=sels.includes(o.id);
        if(o.correct&&sel)d.classList.add('cor');
        else if(o.correct&&!sel)d.classList.add('msd');
        else if(!o.correct&&sel)d.classList.add('wrg');
      });
    });
  }
}

// ══════════════════════════════
// SHOW RATIONALE
// ══════════════════════════════
function showRat(q,cont){
  const a=ans[cur];
  const r=document.createElement('div');r.className='rat';
  r.innerHTML=`<h3>📖 Rationale</h3><div class="rpill ${a.correct?'ok':'err'}">${a.correct?'✅ Correct!':'❌ Incorrect — review below'}</div><div class="rtxt">${q.rat}</div>`;
  // breakdown
  if(q.bd){
    const bd=document.createElement('div');bd.className='rbd';bd.innerHTML='<h4>Answer Breakdown</h4>';
    if(q.type==='mc'||q.type==='sata'){
      Object.entries(q.bd).forEach(([k,v])=>{
        const isc=v.startsWith('✅');
        const itm=document.createElement('div');itm.className=`ri ${isc?'rc':'rw'}`;
        itm.innerHTML=`<span class="rl ${isc?'lc':'lw'}">${k.toUpperCase()}.</span><span>${v}</span>`;
        bd.appendChild(itm);
      });
    }else if(q.type==='matrix'||q.type==='matrix3'){
      Object.entries(q.bd).forEach(([k,v])=>{
        const ri=parseInt(k.replace('row',''));
        const sel=a.sels?.find?.(s=>s.row===ri);
        const ok2=sel&&sel.col===q.rows[ri].c;
        const itm=document.createElement('div');itm.className=`ri ${ok2?'rc':'rw'}`;
        itm.innerHTML=`<span class="rl ${ok2?'lc':'lw'}">R${ri+1}.</span><span>${v}</span>`;
        bd.appendChild(itm);
      });
    }else if(q.type==='bowtie'){
      ['cond','acts','params'].forEach(sec=>{
        const itm=document.createElement('div');itm.className='ri rc';
        const lbl=sec==='cond'?'Condition':sec==='acts'?'Actions':'Parameters';
        itm.innerHTML=`<span class="rl lc">${lbl.charAt(0)}.</span><span><strong>${lbl}:</strong> ${q.bd[sec]}</span>`;
        bd.appendChild(itm);
      });
    }
    r.appendChild(bd);
  }
  // memory
  const m=document.createElement('div');m.className='mem';
  m.innerHTML=`<h4>🧠 Memory Aid / Quick Tip</h4><p>${q.mem}</p>`;
  r.appendChild(m);
  cont.appendChild(r);
}

// ══════════════════════════════
// POPUP
// ══════════════════════════════
function showPop(){
  const p=POPS[popIdx%POPS.length];popIdx++;
  document.getElementById('pe').textContent=p.e;
  document.getElementById('pt').textContent=p.t;
  document.getElementById('ps').textContent=p.s;
  document.getElementById('pop').style.display='flex';
}
function closePop(){document.getElementById('pop').style.display='none';}

// ══════════════════════════════
// NAV
// ══════════════════════════════
function nav(d){
  cur+=d;
  if(cur<0)cur=0;
  if(cur>=Q.length){showEnd();return;}
  render();
}
function updStats(){
  const {c,w}=score();const tot=c+w;
  document.getElementById('cc').textContent=c;
  document.getElementById('wc').textContent=w;
  document.getElementById('sp').textContent=tot>0?Math.round(c/tot*100)+'%':'—';
}

// ══════════════════════════════
// END
// ══════════════════════════════
function showEnd(){
  document.querySelector('.wrap').style.display='none';
  document.getElementById('end').style.display='block';
  const {c,w}=score();const pct=Math.round(c/Q.length*100);
  let em='🎉',msg='';
  if(pct>=90){em='🏆';msg='Exceptional! You have mastered Cognition Pharmacology at an application level. You are ready for your exam!';}
  else if(pct>=80){em='🌟';msg='Great work! Strong command of the content. Review your missed questions\' rationales to fill any remaining gaps.';}
  else if(pct>=70){em='📚';msg='Solid foundation! You understand the major concepts — focused review on the specific drugs you struggled with will get you there.';}
  else if(pct>=60){em='💪';msg='Keep going! Re-read the rationales carefully, especially for drug interactions and adverse effects. Repetition builds mastery.';}
  else{em='🔄';msg='This content takes multiple passes. Review your Fun Facts sheet, read each rationale, and try again. Each attempt builds real understanding!';}
  document.getElementById('ee').textContent=em;
  document.getElementById('esc').textContent=`${c}/60`;
  document.getElementById('ecc').textContent=c;
  document.getElementById('ewc').textContent=w;
  document.getElementById('epc').textContent=pct+'%';
  document.getElementById('emsg').textContent=msg;
}
function restart(){
  ans=new Array(Q.length).fill(null);cur=0;
  document.getElementById('end').style.display='none';
  document.querySelector('.wrap').style.display='block';
  render();
}
render();
</script>

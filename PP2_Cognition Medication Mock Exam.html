rat:'<strong>B is correct.</strong> Amantadine is primarily eliminated by the kidneys. In clients with CKD, reduced glomerular filtration leads to decreased drug clearance and accumulation of amantadine to toxic levels. The provider should be notified about the client\'s renal function, and dose adjustment may be necessary.',
bd:{a:'❌ Amantadine is excreted unchanged by the kidneys — reduced function SLOWS elimination and increases levels, not decreases them.',b:'✅ Renal excretion of amantadine + reduced GFR = drug accumulation = toxicity risk. This is a clinical concern requiring provider notification.',c:'❌ Potassium retention in CKD is a concern with certain medications but is not the mechanism of concern with amantadine.',d:'❌ Amantadine is not documented as directly nephrotoxic at therapeutic doses.'},
mem:'🫘 Amantadine = "Kidney-Dependent Excretion." Bad kidneys = amantadine stays in the body = accumulation = toxicity. Always check renal function (BUN/Creatinine/eGFR) before administering. This applies to MANY renally cleared drugs — get in the habit of checking!'},

{id:33,type:'mc',drug:'Amantadine',tag:"Parkinson's",
stem:'The nurse is reviewing fall risk for a client taking amantadine. Which combination of adverse effects from this medication creates the highest fall risk in this client?',
opts:[
{id:'a',text:'Dry mouth and nausea increasing the risk of dehydration and electrolyte imbalance'},
{id:'b',text:'Lightheadedness and blurred vision impairing the client\'s ability to perceive and respond to balance changes',correct:true},
{id:'c',text:'Urinary retention and confusion increasing the risk of a fall while attempting to ambulate to the bathroom'},
{id:'d',text:'Anxiety and vivid dreaming resulting in nighttime agitation and nocturnal wandering'}
],
rat:'<strong>B is correct.</strong> While all listed adverse effects can contribute to fall risk, the combination of lightheadedness (dizziness) and blurred vision most directly impairs the sensory and vestibular systems that maintain balance and spatial orientation. This pairing represents the most direct physiological fall risk combination from amantadine\'s adverse effect profile.',
bd:{a:'❌ Dry mouth and nausea are GI adverse effects that can cause dehydration — a secondary fall risk contributor, but not the most direct.',b:'✅ Dizziness impairs balance sense; blurred vision impairs spatial awareness. Together, they create the most direct, immediate fall risk.',c:'❌ Urinary retention and confusion can contribute to falls (rushing to the bathroom, impaired judgment), but are secondary to the direct sensory impairment from lightheadedness and blurred vision.',d:'❌ Nighttime agitation from anxiety/dreaming contributes to nocturnal fall risk but is less immediately dangerous than the dual sensory impairment during waking hours.'},
mem:'🏥 Fall risk from amantadine = Lightheaded + Blurry vision = Can\'t sense where they are + Can\'t see clearly. This combo = step off a curb they didn\'t see, lose balance they couldn\'t feel. Always assess these two together when evaluating fall risk on amantadine!'},

// ════════════════════════════════════════
// BENZTROPINE / TRIHEXYPHENIDYL  Q34–38
// ════════════════════════════════════════
{id:34,type:'sata',drug:'Benztropine',tag:"Parkinson's / EPS",
stem:'The nurse is completing a medication history before administering benztropine to a client. Which findings should prompt the nurse to hold the medication and consult the provider before administration? <em>Select all that apply.</em>',
opts:[
{id:'a',text:'Client has a documented history of narrow-angle glaucoma',correct:true},
{id:'b',text:'Client\'s most recent post-void residual bladder scan showed 380 mL of retained urine',correct:true},
{id:'c',text:'Client\'s chart shows a diagnosis of benign prostatic hyperplasia with recurrent urinary retention',correct:true},
{id:'d',text:'Client is 79 years old and prescribed the medication for mild Parkinson\'s tremor'},
{id:'e',text:'Client has myasthenia gravis documented in their past medical history',correct:true},
{id:'f',text:'Client takes warfarin 5 mg daily for atrial fibrillation'}
],
rat:'<strong>A, B, C, and E are contraindications requiring provider consultation before administration.</strong> Glaucoma is a hard contraindication — anticholinergics raise intraocular pressure. Urinary retention (elevated PVR) and BPH are contraindications due to the anticholinergic effect on the bladder detrusor muscle. Myasthenia gravis is a contraindication as anticholinergics worsen neuromuscular transmission. Age 79 alone triggers Beers Criteria caution but is not a contraindication per se, and warfarin does not significantly interact with benztropine.',
bd:{a:'✅ Glaucoma is a hard contraindication — anticholinergic pupil dilation can trigger acute angle-closure glaucoma crisis.',b:'✅ A PVR of 380 mL indicates urinary retention — adding an anticholinergic will worsen bladder outlet obstruction.',c:'✅ BPH with urinary retention is a documented contraindication to anticholinergic therapy.',d:'❌ Age alone is a Beers Criteria caution, not a hard contraindication. Additional assessment is needed, but age 79 by itself does not require withholding.',e:'✅ Myasthenia gravis is a neuromuscular disease worsened by anticholinergics — a contraindication.',f:'❌ Warfarin has no significant pharmacodynamic interaction with benztropine.'},
mem:'🚫 Benztropine contraindications: "GUMB" — Glaucoma, Urinary retention, Myasthenia gravis, BPH. These are hard stops. Age 79 = Beers Criteria FLAG (use caution), not automatic hold. Always assess before administering any anticholinergic!'},

{id:35,type:'mc',drug:'Benztropine',tag:"Parkinson's / EPS",
stem:'A nurse is administering medications on a medical-surgical unit. A client with schizophrenia who received haloperidol 30 minutes ago begins demonstrating facial grimacing, torticollis (involuntary neck turning), and rigid, dystonic arm posturing. The client appears frightened and in pain. Which is the nurse\'s priority action?',
opts:[
{id:'a',text:'Administer a PRN dose of haloperidol to override the extrapyramidal symptoms with additional dopamine blockade'},
{id:'b',text:'Reposition the client in a supine position with full spinal precautions until the symptoms resolve spontaneously'},
{id:'c',text:'Administer benztropine as ordered for acute dystonic reaction and notify the provider of the complication',correct:true},
{id:'d',text:'Hold all further psychiatric medications and initiate a neurology consultation for a new-onset movement disorder'}
],
rat:'<strong>C is correct.</strong> The described presentation — acute onset of facial grimacing, torticollis, and dystonic posturing after haloperidol administration — is a classic acute dystonic reaction, an extrapyramidal adverse effect. Benztropine is the treatment of choice for acute dystonic reactions caused by antipsychotics. The nurse should administer as ordered and notify the provider.',
bd:{a:'❌ Additional haloperidol would worsen dopamine blockade and worsen the dystonic reaction.',b:'❌ Repositioning does not treat drug-induced dystonia — it is involuntary muscle spasm, not a positioning issue.',c:'✅ Acute dystonic reaction = benztropine (anticholinergic) is the antidote. Administer and notify provider.',d:'❌ This is a known, expected adverse effect of haloperidol. A neurology consult is not the immediate priority — treating the reaction is.'},
mem:'⚡ Haloperidol → blocks dopamine → dopamine-acetylcholine imbalance → EPS/dystonia. Fix: benztropine BLOCKS acetylcholine → restores balance → dystonia resolves. The rule: "Antipsychotic causes dystonia → Anticholinergic is the antidote."'},

{id:36,type:'mc',drug:'Benztropine',tag:"Parkinson's / EPS",
stem:'A client has been receiving benztropine for one week for Parkinson\'s disease tremor management. The client\'s family reports that the client seems more confused and "not like themselves" compared to before starting the medication. The nurse\'s priority assessment finding that most directly guides the plan of care is:',
opts:[
{id:'a',text:'The client\'s last bowel movement was three days ago and the abdomen is distended'},
{id:'b',text:'The client is oriented to name only, showing new disorientation to place, time, and situation compared to baseline',correct:true},
{id:'c',text:'The client\'s skin and mucous membranes are dry and the client reports a bitter taste in the mouth'},
{id:'d',text:'The client\'s heart rate is 98 bpm and blood pressure is 138/88 mmHg'}
],
rat:'<strong>B is correct.</strong> New-onset disorientation is the highest-priority finding. Anticholinergic-induced CNS effects — including confusion, disorientation, agitation, and psychotic features — are dangerous, especially in older adults, and require immediate provider notification and potential medication discontinuation. While constipation and dry mouth are also anticholinergic adverse effects, they are secondary to the acute cognitive change.',
bd:{a:'❌ Constipation and bowel obstruction are concerning but are secondary to an acute change in mental status in terms of clinical priority.',b:'✅ New-onset cognitive impairment is the highest-priority finding. Anticholinergics cause confusion and disorientation — this is the most dangerous adverse effect here and the one driving the clinical decision.',c:'❌ Dry mouth and altered taste are expected, mild anticholinergic effects — not the priority finding.',d:'❌ HR of 98 and BP of 138/88 are within acceptable ranges and are not the priority finding in this context.'},
mem:'🧠 Anticholinergics + Elderly = CNS TOXICITY risk. The most dangerous sign = CONFUSION and DISORIENTATION. Not dry mouth. Not constipation. The BRAIN changes are the priority. This is exactly why Beers Criteria flags anticholinergics in the elderly — cognitive impairment is the biggest risk.'},

{id:37,type:'sata',drug:'Benztropine / Trihexyphenidyl',tag:"Parkinson's / EPS",
stem:'A nurse is teaching a client prescribed benztropine for extrapyramidal symptoms. Which points should be included in the teaching? <em>Select all that apply.</em>',
opts:[
{id:'a',text:'Avoid activities requiring alertness until response to the medication is known, as sedation can occur',correct:true},
{id:'b',text:'Report difficulty urinating or a sensation of incomplete bladder emptying',correct:true},
{id:'c',text:'In hot weather, limit outdoor activity and stay in air-conditioned environments because sweating may be impaired',correct:true},
{id:'d',text:'This medication will improve all symptoms of Parkinson\'s disease equally, including bradykinesia'},
{id:'e',text:'Report any new visual blurring or photosensitivity to the provider',correct:true},
{id:'f',text:'Hard candy or frequent sips of water may help relieve the dry mouth commonly associated with this medication',correct:true}
],
rat:'<strong>A, B, C, E, and F are correct.</strong> Anticholinergics cause sedation, urinary retention, decreased sweating (heat intolerance), blurred vision, and dry mouth — all of which require specific teaching. Benztropine/trihexyphenidyl primarily targets tremor and is NOT effective for all Parkinson\'s symptoms equally — it has minimal effect on bradykinesia and rigidity.',
bd:{a:'✅ Sedation is listed — clients must be cautious with driving and hazardous activities.',b:'✅ Urinary retention is a significant anticholinergic effect requiring provider notification.',c:'✅ Anhidrosis (inability to sweat) causes dangerous heat intolerance — outdoor heat exposure is a safety risk.',d:'❌ Anticholinergics primarily address tremor. They are NOT effective for bradykinesia and are NOT equivalent to levodopa for overall symptom control.',e:'✅ Blurred vision and photosensitivity are expected anticholinergic effects requiring provider notification.',f:'✅ Hard candy and water manage dry mouth — a common and uncomfortable adverse effect.'},
mem:'🌡️ Anticholinergics = "Can\'t SWEAT." No sweating = overheating in summer. This is a real safety risk! Also: blurred vision, urinary retention, dry mouth. And remember: benztropine is for TREMOR primarily — not a substitute for levodopa\'s broad symptom control.'},

{id:38,type:'matrix3',drug:'Benztropine',tag:"Parkinson's / EPS",
stem:'The nurse is reviewing medication orders. For each clinical situation, indicate whether administering benztropine is <strong>Indicated</strong>, <strong>Contraindicated</strong>, or <strong>Non-Essential</strong>.',
cols:['Indicated','Contraindicated','Non-Essential'],
rows:[
{t:'Client presents with acute torticollis and dystonia 20 minutes after receiving haloperidol',c:0},
{t:'Client with Parkinson\'s disease has adequate tremor control on carbidopa/levodopa alone with no residual symptoms',c:2},
{t:'Client with Parkinson\'s disease has a documented history of urinary retention requiring intermittent catheterization',c:1},
{t:'Client\'s Parkinson\'s tremor is not adequately controlled on levodopa and the provider considers adjunct therapy',c:0},
{t:'Client is 82 years old with Parkinson\'s and is currently experiencing delirium in the hospital',c:1},
{t:'Client has narrow-angle glaucoma and mild Parkinson\'s disease tremor interfering with daily activities',c:1}
],
rat:'<strong>Rows 1 and 4 are Indicated. Rows 3, 5, and 6 are Contraindicated. Row 2 is Non-Essential.</strong> Benztropine is indicated for acute EPS/dystonic reactions and as second-line adjunct for inadequately controlled tremors. Urinary retention, delirium in elderly, and glaucoma are all contraindications. When levodopa is already providing adequate control, adding benztropine is unnecessary and adds risk.',
bd:{row0:'Indicated — Acute dystonic reaction is the primary indication for benztropine.',row1:'Non-Essential — Adequate symptom control already achieved; adding an anticholinergic adds risk without benefit.',row2:'Contraindicated — Anticholinergics worsen urinary retention by reducing detrusor muscle activity.',row3:'Indicated — Second-line adjunct for residual tremor is an appropriate use of benztropine.',row4:'Contraindicated — Anticholinergics worsen delirium; Beers Criteria prohibits anticholinergics in elderly with delirium.',row5:'Contraindicated — Glaucoma is a hard contraindication; anticholinergics elevate intraocular pressure.'},
mem:'🎯 Benztropine indications: Acute EPS and residual tremor. Hard contraindications: Glaucoma, Urinary retention, Delirium in elderly. Non-essential: when symptoms are already well-controlled. When in doubt, ask: "Does this client have any of the GUMB contraindications first?"'},

// ════════════════════════════════════════
// DONEPEZIL  Q39–46
// ════════════════════════════════════════
{id:39,type:'mc',drug:'Donepezil',tag:"Alzheimer's",
stem:'A client with mild Alzheimer\'s disease is prescribed donepezil. The client\'s family asks how the medication works and why it cannot simply restore memory. Which nurse response best explains the mechanism and limitation?',
opts:[
{id:'a',text:'"Donepezil adds new acetylcholine to the brain to replace what has been lost — but there is a limit to how much can be produced"'},
{id:'b',text:'"Donepezil prevents the breakdown of acetylcholine in the synaptic cleft, increasing its availability — but it does not repair or regenerate the neurons that have already been destroyed"',correct:true},
{id:'c',text:'"Donepezil blocks glutamate receptors to prevent further neuron death, which slows memory decline but cannot reverse existing damage"'},
{id:'d',text:'"Donepezil replaces acetylcholine at receptor sites directly and temporarily improves signaling, but the binding is too brief to permanently restore memory"'}
],
rat:'<strong>B is correct.</strong> Donepezil inhibits acetylcholinesterase — the enzyme that breaks down acetylcholine in the synapse. This increases acetylcholine availability in the remaining, functioning synapses. It does not replace neurons, add new neurotransmitter, or regenerate damaged neural tissue — which is why it cannot restore lost memory.',
bd:{a:'❌ Donepezil does not ADD acetylcholine — it prevents the breakdown of existing acetylcholine. These are fundamentally different mechanisms.',b:'✅ Acetylcholinesterase inhibition = more acetylcholine available in the synapse. But dead neurons cannot be rebuilt — hence no memory restoration.',c:'❌ Blocking glutamate receptors is the mechanism of memantine, not donepezil. These are different classes with different indications.',d:'❌ Donepezil does not directly bind to acetylcholine receptors — it inhibits the enzyme that degrades acetylcholine.'},
mem:'🔬 Donepezil blocks "AChE" (AcetylCholinEsterase) = enzyme that breaks down ACh. More ACh in the synapse = better signaling in surviving neurons. BUT: dead neurons = dead neurons. The drug can\'t rebuild what Alzheimer\'s destroyed — it can only maximize what\'s left.'},

{id:40,type:'mc',drug:'Donepezil',tag:"Alzheimer's",
stem:'A client with Alzheimer\'s disease has been taking donepezil for two months. During a routine clinic visit, the nurse observes the client has a new onset of wheezing and shortness of breath with an SpO2 of 91%. The client has a history of mild, well-controlled asthma. The nurse\'s priority action is to:',
opts:[
{id:'a',text:'Administer donepezil as scheduled and reassess the client\'s respiratory status in 30 minutes'},
{id:'b',text:'Document the respiratory findings as a new asthma exacerbation unrelated to the medication and initiate standard asthma protocol'},
{id:'c',text:'Hold donepezil, provide respiratory support, and notify the provider of possible drug-induced bronchoconstriction',correct:true},
{id:'d',text:'Reduce donepezil dose and add a maintenance inhaler to the regimen without contacting the provider'}
],
rat:'<strong>C is correct.</strong> Donepezil is a cholinesterase inhibitor — increased acetylcholine causes bronchoconstriction via muscarinic receptors in the airways. In a client with pre-existing asthma, this can precipitate significant respiratory compromise. SpO2 of 91% is below the acceptable threshold. The nurse must hold the medication, initiate respiratory support, and notify the provider immediately.',
bd:{a:'❌ Administering the causative agent while the client is in respiratory distress is unsafe.',b:'❌ While asthma exacerbation is possible, the timing relative to donepezil and the known adverse effect profile requires medication evaluation — not exclusion.',c:'✅ Priority: hold the causative drug, support breathing, notify provider. SpO2 of 91% requires immediate intervention.',d:'❌ Independently adjusting dose and adding inhalers without provider involvement is outside nursing scope.'},
mem:'💨 Cholinesterase inhibitors → MORE acetylcholine → airway muscarinic stimulation → BRONCHOCONSTRICTION. Clients with asthma or COPD are at HIGH RISK. SpO2 < 90% = emergency. Rule: "Broncho-spasm + Cholinesterase inhibitor + Asthma = HOLD + CALL provider NOW."'},

{id:41,type:'sata',drug:'Donepezil',tag:"Alzheimer's",
stem:'The nurse is planning discharge education for a client with Alzheimer\'s disease prescribed donepezil. Which teaching points should be included? <em>Select all that apply.</em>',
opts:[
{id:'a',text:'Report any episodes of fainting, persistent dizziness, or an unusually slow or irregular heartbeat to the provider',correct:true},
{id:'b',text:'Administer donepezil at bedtime to minimize gastrointestinal side effects during waking hours',correct:true},
{id:'c',text:'Avoid concurrent use of NSAIDs such as ibuprofen or naproxen unless provider-approved, due to increased GI bleeding risk',correct:true},
{id:'d',text:'Expect significant memory restoration within 30 days of starting the medication'},
{id:'e',text:'Donepezil tablets may be swallowed whole or allowed to dissolve on the tongue followed by water',correct:true},
{id:'f',text:'Use of over-the-counter antihistamines such as diphenhydramine for sleep or allergy relief can reduce the effectiveness of this medication',correct:true}
],
rat:'<strong>A, B, C, E, and F are correct.</strong> Bradycardia requires reporting. Bedtime dosing is the standard recommendation. NSAID co-administration increases GI bleeding risk. Orally disintegrating tablets dissolve on the tongue. Anticholinergic medications including antihistamines oppose donepezil\'s cholinergic mechanism and reduce its effectiveness. Donepezil does not restore memory — it may slow decline.',
bd:{a:'✅ Bradycardia (from increased vagal tone) is a serious adverse effect requiring provider notification.',b:'✅ Bedtime administration is the specific timing recommendation in the materials.',c:'✅ NSAIDs increase GI bleeding risk in combination with donepezil.',d:'❌ Donepezil does not restore memory. It may modestly slow cognitive decline over months, not weeks.',e:'✅ ODT tablets can dissolve on the tongue — important for clients with swallowing difficulties.',f:'✅ Anticholinergics oppose cholinesterase inhibitors directly — less acetylcholine = less drug benefit.'},
mem:'💊 Donepezil "anti-enemies": Antihistamines (anticholinergic = opposes it), NSAIDs (GI bleed risk). Donepezil "friends": Bedtime dosing, ODT option for swallowing issues. Always screen for diphenhydramine in elderly Alzheimer\'s clients — it\'s in many OTC sleep/allergy products!'},

{id:42,type:'mc',drug:'Donepezil',tag:"Alzheimer's",
stem:'A client\'s family member calls the clinic reporting that the client, who has Alzheimer\'s disease and takes donepezil, has been nauseated and had loose stools since starting the medication one week ago. The client is maintaining adequate oral intake. Which is the most appropriate nursing response?',
opts:[
{id:'a',text:'Advise the family to hold the donepezil and schedule an urgent office visit within 48 hours'},
{id:'b',text:'Inform the family that nausea and loose stools are expected early adverse effects that often improve over time, and instruct them to report worsening or inability to maintain oral intake',correct:true},
{id:'c',text:'Instruct the family to halve the donepezil dose for one week, then resume the full dose if symptoms resolve'},
{id:'d',text:'Recommend the family add a daily probiotic supplement to resolve the medication-induced GI symptoms before the next appointment'}
],
rat:'<strong>B is correct.</strong> Nausea and diarrhea are common early GI adverse effects of cholinesterase inhibitors, including donepezil. They typically improve as the body adjusts over the first few weeks. Because the client is maintaining oral intake, this is a manageable adverse effect requiring monitoring, not an emergency. The family should be educated and told when to escalate.',
bd:{a:'❌ Holding donepezil is not indicated for mild, expected GI adverse effects when the client maintains oral intake.',b:'✅ Early GI adverse effects are expected and often resolve. Teaching the family when to escalate is the appropriate response.',c:'❌ Independently advising dose reduction is outside nursing scope and is not the appropriate response for expected, mild adverse effects.',d:'❌ Probiotic recommendation for drug-induced GI adverse effects is not evidence-based and does not address the underlying pharmacological cause.'},
mem:'🤢 Donepezil GI side effects (nausea, diarrhea) = EXPECTED in the first 1-4 weeks. Why? More acetylcholine = more GI motility. If the client is eating and staying hydrated = reassure + monitor. If vomiting, dehydrated, or not eating = escalate. Bedtime dosing helps minimize these during waking hours.'},

{id:43,type:'matrix',drug:'Donepezil',tag:"Alzheimer's",
stem:'The nurse evaluates outcomes for a client with mild Alzheimer\'s disease who has been taking donepezil for four months. For each finding, indicate whether it represents an <strong>Expected Outcome</strong> or an <strong>Unexpected Outcome</strong> requiring provider follow-up.',
cols:['Expected Outcome','Unexpected — Requires Follow-Up'],
rows:[
{t:'Client\'s family reports modest improvement in short-term memory and the client is more engaged during family visits',c:0},
{t:'Client\'s apical pulse during assessment is consistently 42–46 bpm across three separate readings',c:1},
{t:'Client shows no significant cognitive improvement but the family notes the disease has not visibly progressed in four months',c:0},
{t:'Client develops new-onset bilateral wheezing after a dose increase, with SpO2 dropping from 97% to 88%',c:1},
{t:'Client reports mild nausea and loose stools in the morning after taking donepezil, which has been consistent since starting',c:0},
{t:'Client\'s family notes the client is able to manage simple daily tasks such as dressing and simple meal preparation independently',c:0}
],
rat:'<strong>Rows 1, 3, 5, and 6 are expected outcomes. Rows 2 and 4 are unexpected and require follow-up.</strong> Modest cognitive improvement or disease stabilization, mild GI adverse effects, and improved ADL function are all expected therapeutic outcomes. A consistent apical pulse of 42-46 bpm represents severe bradycardia (normal = 60-100) and requires immediate provider notification. Acute bronchoconstriction with SpO2 drop to 88% is a respiratory emergency.',
bd:{row0:'Expected — Modest memory improvement and social engagement are achievable therapeutic goals.',row1:'Unexpected — HR 42–46 bpm is severe bradycardia. Normal is 60–100. This is a critical finding requiring immediate provider notification.',row2:'Expected — Disease stabilization without noticeable progression is a valid and acceptable outcome of cholinesterase inhibitor therapy.',row3:'Unexpected — Acute bronchoconstriction with SpO2 88% is a respiratory emergency. SpO2 below 90% requires immediate intervention.',row4:'Expected — Mild, consistent GI adverse effects that are manageable are expected early in therapy.',row5:'Expected — Maintained functional independence for ADLs is a primary therapeutic goal.'},
mem:'❤️ Donepezil red flags: HR < 60 = bradycardia concern; HR < 50 = urgent action needed; SpO2 < 90% = EMERGENCY. Expected outcomes: modestly better cognition OR just stable disease. Both count as "working." Mild GI symptoms = expected, especially in the morning.'},

{id:44,type:'mc',drug:'Donepezil',tag:"Alzheimer's",
stem:'The nurse is reviewing medications for a 74-year-old client with Alzheimer\'s disease who takes donepezil and has a new prescription for oxybutynin (anticholinergic) for overactive bladder. The nurse\'s priority concern about this combination is:',
opts:[
{id:'a',text:'The additive effect on heart rate, increasing the risk of tachycardia and cardiac arrhythmias'},
{id:'b',text:'Oxybutynin\'s anticholinergic mechanism will directly oppose the therapeutic action of donepezil and may worsen cognitive function',correct:true},
{id:'c',text:'Both medications are renally cleared, creating competition for renal excretion and toxic accumulation of both drugs'},
{id:'d',text:'Oxybutynin increases the risk of GI bleeding when combined with the cholinergic activity of donepezil'}
],
rat:'<strong>B is correct.</strong> Donepezil works by INCREASING acetylcholine (cholinergic). Oxybutynin is an ANTICHOLINERGIC — it works by BLOCKING acetylcholine at muscarinic receptors. These two drugs directly oppose each other\'s mechanisms. Additionally, oxybutynin\'s anticholinergic properties can independently worsen cognitive function in elderly patients. This combination is clinically problematic.',
bd:{a:'❌ Donepezil causes bradycardia (increased vagal tone). Oxybutynin causes tachycardia (anticholinergic). The concern is pharmacodynamic opposition, not additive heart rate increase.',b:'✅ Cholinesterase inhibitor (increases ACh) + anticholinergic (blocks ACh) = direct pharmacological opposition. Cognitive worsening can result.',c:'❌ Renal competition is not a documented concern for this combination.',d:'❌ GI bleeding risk is associated with NSAIDs combined with donepezil — not anticholinergics.'},
mem:'⚔️ "ACh drug + anti-ACh drug = WAR." Donepezil INCREASES acetylcholine. Oxybutynin BLOCKS acetylcholine. They directly cancel each other out. Oxybutynin is a BEERS CRITERIA drug in older adults with dementia for exactly this reason. Always flag this combination!'},

{id:45,type:'mc',drug:'Donepezil',tag:"Alzheimer's",
stem:'A client with moderate Alzheimer\'s disease who takes donepezil is brought to the clinic by family members who are increasingly frustrated. They report the client\'s memory is "no better than before starting the medication" after six months of therapy. Which response by the nurse is most therapeutic?',
opts:[
{id:'a',text:'"The medication is probably not working in this client. We should discuss alternative treatment options with the provider."'},
{id:'b',text:'"Stabilization of symptoms and maintenance of current function can be a positive response — the medication may be preventing further decline that would have otherwise occurred"',correct:true},
{id:'c',text:'"The dose may need to be increased. Greater doses of donepezil always produce greater memory improvement in clients who are not responding."'},
{id:'d',text:'"This confirms that Alzheimer\'s disease has progressed to a stage where donepezil is no longer indicated and treatment goals should shift."'}
],
rat:'<strong>B is correct.</strong> A key teaching point about Alzheimer\'s medications is that therapeutic success does not always mean improvement — it may mean preventing or slowing decline. A client whose disease has not visibly progressed while on donepezil may, in fact, be responding to the medication. Families need this framing to have realistic expectations.',
bd:{a:'❌ The absence of improvement does not confirm failure. Stability is a valid and meaningful outcome in progressive neurodegenerative disease.',b:'✅ Slowing or halting progression is a success criterion for Alzheimer\'s medications. Families must be educated about this expectation.',c:'❌ Higher doses of donepezil do not guarantee proportionally greater cognitive benefit, and dose escalation without provider direction is outside nursing scope.',d:'❌ Stability after six months does not indicate disease progression to a stage requiring discontinuation.'},
mem:'📊 Alzheimer\'s drug success = STABILIZATION counts. Think of it like a treadmill going backward — donepezil slows the treadmill. The client isn\'t moving forward, but they\'re not moving backward as fast. Families need to hear: "Staying the same IS a win."'},

{id:46,type:'bowtie',drug:'Donepezil',tag:"Alzheimer's",
stem:'A 79-year-old client with Alzheimer\'s disease prescribed donepezil is brought to the emergency department by their family. The family reports the client collapsed at home and is "barely responding." The nurse assesses: BP 88/52 mmHg, HR 36 bpm, respiratory rate 14, SpO2 94% on room air. The client is lethargic but arousable.',
cond:{label:'The nurse determines the client\'s presentation is most consistent with:',opts:[
{id:'c1',text:'Severe bradycardia and hypotension secondary to excessive cholinergic activity from donepezil',correct:true},
{id:'c2',text:'Acute ischemic stroke presenting with hemodynamic instability and depressed consciousness'},
{id:'c3',text:'Anticholinergic toxicity presenting with paradoxical bradycardia and hypotension'},
{id:'c4',text:'Serotonin syndrome secondary to a drug interaction between donepezil and a concurrent antidepressant'}
]},
acts:{label:'Priority actions to take (Select 2):',opts:[
{id:'a1',text:'Hold donepezil and ensure IV access is established for emergency cardiac and hemodynamic support',correct:true},
{id:'a2',text:'Administer an additional dose of donepezil to assess whether the bradycardia is drug-related'},
{id:'a3',text:'Notify the provider immediately, prepare for possible atropine administration, and connect the client to continuous cardiac monitoring',correct:true},
{id:'a4',text:'Position the client supine with legs elevated and administer a fluid bolus without first notifying the provider'}
]},
params:{label:'Parameters to monitor (Select 2):',opts:[
{id:'p1',text:'Continuous cardiac monitoring for dysrhythmias associated with severe bradycardia',correct:true},
{id:'p2',text:'Blood pressure response to interventions, given the risk of cardiovascular collapse with HR of 36',correct:true},
{id:'p3',text:'Urine specific gravity for dehydration secondary to medication-induced vomiting'},
{id:'p4',text:'Serum lithium levels for toxicity as a potential confounding cause of bradycardia'}
]},
rat:'The client is presenting with <strong>severe drug-induced bradycardia and hypotension</strong> from donepezil. HR of 36 bpm is life-threatening. Cholinesterase inhibitors increase vagal tone, causing bradycardia, which can progress to cardiovascular collapse. The medication must be held, emergency hemodynamic support initiated, and atropine may be required.',
bd:{cond:'HR 36 + hypotension + lethargy in an Alzheimer\'s patient on donepezil = cholinergic-induced bradycardia. Stroke would not cause isolated bradycardia. Anticholinergic toxicity causes tachycardia, not bradycardia.',acts:'Hold donepezil and establish IV access are emergency priorities. Notify provider and prepare for atropine. Administering more of the causative drug is dangerous. Fluid bolus alone without notification is insufficient.',params:'Continuous cardiac monitoring and BP monitoring are the priority parameters in a hemodynamically unstable client with severe bradycardia.'},
mem:'❤️‍🔥 HR 36 = EMERGENCY. Donepezil → vagal tone ↑ → heart rate ↓. This is the extreme end of bradycardia risk. Antidote: ATROPINE (anticholinergic). Always monitor HR before and after donepezil administration. Normal = 60-100. Below 60 = concern. Below 50 = urgent. 36 = critical.'},

// ════════════════════════════════════════
// RIVASTIGMINE  Q47–51
// ════════════════════════════════════════
{id:47,type:'mc',drug:'Rivastigmine',tag:"Alzheimer's",
stem:'The nurse is teaching a client\'s caregiver how to apply a rivastigmine transdermal patch. Which caregiver statement indicates a need for further education?',
opts:[
{id:'a',text:'"I will apply the new patch to a different site on the chest, upper arm, or lower back each day"'},
{id:'b',text:'"I need to remove the old patch completely before applying the new one"'},
{id:'c',text:'"I will write the date and time on the patch with a marker so we can keep track of when it was applied"'},
{id:'d',text:'"I can reapply the patch to the same area we used today once it has been 48 hours since the last application there"',correct:true}
],
rat:'<strong>D requires further education.</strong> The same application site should not be reused for 14 days — not 48 hours. Reusing a site too soon causes local skin irritation and inconsistent drug absorption. The caregiver must understand the 14-day rotation rule.',
bd:{a:'✅ Rotating between chest, upper arm, and lower back is correct practice.',b:'✅ Removing the old patch before applying a new one is essential — leaving both on leads to doubled dosing.',c:'✅ Writing the date on the patch is excellent practice to prevent missed or doubled applications.',d:'❌ The caregiver believes 48 hours is sufficient — this is incorrect. The same site should not be used for 14 days to prevent skin irritation.'},
mem:'📅 Rivastigmine patch rule: 14 DAYS before reusing a site. Not 24 hours. Not 48 hours. FOURTEEN DAYS. Three rotation sites: Chest, Upper arm, Lower back. Date the patch. Remove old before applying new. If you see "48 hours" on an exam — that\'s the wrong answer!'},

{id:48,type:'sata',drug:'Rivastigmine',tag:"Alzheimer's",
stem:'A client with Alzheimer\'s disease is being transitioned from oral rivastigmine capsules to the transdermal patch formulation. Which nursing considerations apply to this transition? <em>Select all that apply.</em>',
opts:[
{id:'a',text:'Apply the first patch on the day following the last oral capsule dose to avoid overlap and potential dosing duplication',correct:true},
{id:'b',text:'Assess the client\'s skin at the intended patch site for redness, cuts, or irritation before each application',correct:true},
{id:'c',text:'Inform the caregiver that the patch form eliminates all GI adverse effects previously experienced with the oral capsule',
},
{id:'d',text:'Avoid exposing the patch site to prolonged direct heat sources such as heating pads, as heat increases drug absorption and may cause toxicity',correct:true},
{id:'e',text:'Document the exact location of patch placement to ensure proper site rotation',correct:true},
{id:'f',text:'Teach the caregiver to fold the used patch in half with the adhesive sides together before disposing of it safely',correct:true}
],
rat:'<strong>A, B, D, E, and F are correct.</strong> Timing prevents duplicate dosing. Skin assessment ensures safe application. Heat increases transdermal absorption, risking toxicity. Documentation enables proper rotation. Folding used patches prevents accidental exposure to children or pets. While the patch form reduces GI adverse effects compared to oral, it does not eliminate them completely — so C is incorrect.',
bd:{a:'✅ Starting the patch the day after the last oral dose prevents overlap dosing and accidental double-dosing.',b:'✅ Skin must be clean, dry, and intact for safe and consistent absorption.',c:'❌ The patch reduces GI side effects compared to oral (no first-pass gastric exposure), but does not eliminate ALL GI effects.',d:'✅ External heat sources increase skin permeability and drug absorption — rivastigmine toxicity risk is real.',e:'✅ Documentation enables the 14-day rotation protocol and prevents site reuse.',f:'✅ Folding the used patch protects against accidental exposure — children and pets can be harmed by adhesive residue.'},
mem:'♻️ Patch safety: Fold and dispose safely (children/pets!). Heat = dangerous (increases absorption). Start the day AFTER last oral dose. Document the site. Check skin before applying. The patch reduces GI effects but doesn\'t eliminate them — "reduces" ≠ "eliminates."'},

{id:49,type:'mc',drug:'Rivastigmine',tag:"Alzheimer's",
stem:'A client taking oral rivastigmine for Alzheimer\'s disease vomits shortly after taking the morning dose. The caregiver asks whether they should give another dose. The nurse\'s most appropriate instruction is to:',
opts:[
{id:'a',text:'Administer the next scheduled dose at the regular time and do not give a replacement dose for the vomited dose',correct:true},
{id:'b',text:'Administer the full dose again immediately, since the medication was likely not absorbed'},
{id:'c',text:'Skip the next two scheduled doses to allow GI irritation to resolve before resuming the medication'},
{id:'d',text:'Crush and dissolve the next dose in water or juice to reduce the risk of vomiting on re-administration'}
],
rat:'<strong>A is correct.</strong> If a dose is vomited, the client should NOT receive a replacement dose — the dose cannot be confirmed as unabsorbed, and doubling could cause toxicity. The caregiver should wait for the next scheduled dose. Additionally, the nurse should notify the provider of persistent vomiting, as medication adjustment may be needed.',
bd:{a:'✅ Do not re-dose after vomiting — risk of double-dosing and toxicity. Resume at the next scheduled time.',b:'❌ The dose may have been partially absorbed. Re-administering immediately risks toxicity from double dosing.',c:'❌ Skipping two doses disrupts therapeutic continuity. Provider guidance is needed for vomiting management, not blanket dose skipping.',d:'❌ Rivastigmine capsules should not be crushed and dissolved without specific provider order and formulation approval.'},
mem:'🤮 Vomited a dose? Skip it — never double up. Wait for the NEXT scheduled time. Think: "Did some absorb? Maybe. Did all absorb? Unknown. Is giving double safe? No." When in doubt = wait for the next dose and notify the provider of persistent vomiting.'},

{id:50,type:'mc',drug:'Rivastigmine',tag:"Alzheimer's",
stem:'A nurse is caring for a client with Parkinson\'s disease dementia. The provider prescribes rivastigmine. The client\'s family asks why the provider chose rivastigmine rather than donepezil. Which nurse response reflects the most accurate understanding?',
opts:[
{id:'a',text:'"Rivastigmine has a faster onset of action than donepezil and is therefore preferred when rapid symptom control is needed"'},
{id:'b',text:'"Rivastigmine is the only cholinesterase inhibitor approved specifically for Parkinson\'s disease dementia, in addition to Alzheimer\'s disease"',correct:true},
{id:'c',text:'"Rivastigmine causes fewer GI adverse effects than donepezil, making it the preferred choice for clients with pre-existing GI conditions"'},
{id:'d',text:'"Rivastigmine does not affect the heart rate and is preferred over donepezil in clients with pre-existing cardiac conditions"'}
],
rat:'<strong>B is correct.</strong> Rivastigmine is uniquely indicated for both Alzheimer\'s disease and Parkinson\'s disease dementia. Donepezil is primarily indicated for Alzheimer\'s disease. This dual indication makes rivastigmine specifically appropriate for Parkinson\'s disease dementia.',
bd:{a:'❌ Onset of action is not the distinguishing factor between these agents — they require weeks for full effect.',b:'✅ Rivastigmine has FDA approval for Parkinson\'s disease dementia, in addition to AD. Donepezil is primarily indicated for AD.',c:'❌ Rivastigmine oral formulations actually have a higher GI adverse effect profile than donepezil — the transdermal patch reduces this.',d:'❌ Both cholinesterase inhibitors can cause bradycardia. Cardiac effects are not the distinguishing factor for drug selection.'},
mem:'🧩 Rivastigmine = dual indication: Alzheimer\'s AND Parkinson\'s dementia. When you see a Parkinson\'s patient with cognitive decline, think rivastigmine first. Donepezil = primarily Alzheimer\'s. This is a high-yield distinction for exams!'},

{id:51,type:'mc',drug:'Rivastigmine',tag:"Alzheimer's",
stem:'A client taking oral rivastigmine twice daily for Alzheimer\'s disease skips a dose due to severe nausea. The provider later discontinues the medication for two weeks while managing the nausea. When rivastigmine is restarted, the nurse recognizes which action is most appropriate?',
opts:[
{id:'a',text:'Restart at the dose the client was taking before discontinuation, since the body quickly re-establishes tolerance'},
{id:'b',text:'Restart at the lowest available dose and titrate up gradually, as restarting at a previous dose after a break risks significant adverse effects',correct:true},
{id:'c',text:'Restart at twice the previous dose to re-establish therapeutic levels as quickly as possible'},
{id:'d',text:'Administer the full previous dose but switch to transdermal delivery to minimize GI risk'}
],
rat:'<strong>B is correct.</strong> If rivastigmine has been discontinued for more than several days, restarting requires beginning again at the lowest dose and titrating up gradually. Resuming at a higher previous dose after a treatment gap significantly increases the risk of severe GI adverse effects (nausea, vomiting) and cholinergic toxicity.',
bd:{a:'❌ Tolerance is lost after extended breaks — the body no longer accommodates the higher dose. Starting at the previous dose risks toxicity.',b:'✅ Re-titrate from the lowest dose after any treatment break longer than several days. This is a clinically important safety principle.',c:'❌ Doubling the dose is dangerous at any point in therapy.',d:'❌ Switching to the patch is not contraindicated, but the titration principle still applies — start low, go slow.'},
mem:'📈 Rivastigmine gap rule: "Start fresh, start LOW." If treatment breaks for more than a few days, the titration clock resets. This is because GI tolerance is lost with the break. Never restart at the last dose — it risks severe GI toxicity. Slow titration protects the patient!'},

{id:52,type:'mc',drug:'Memantine',tag:"Alzheimer's",
stem:'A nurse is caring for two clients. Client A has mild Alzheimer\'s disease with a MMSE score of 22. Client B has severe Alzheimer\'s disease and cannot perform basic ADLs independently. The provider prescribes memantine for one of the clients. Which client is the most appropriate candidate, and why?',
opts:[
{id:'a',text:'Client A, because memantine is most effective early in the disease course when the most neurons remain functional'},
{id:'b',text:'Client B, because memantine is indicated for moderate to severe Alzheimer\'s disease and targets glutamate-mediated neuronal damage at this stage',correct:true},
{id:'c',text:'Client B, because clients with severe Alzheimer\'s cannot take oral cholinesterase inhibitors and memantine is the only available route'},
{id:'d',text:'Client A, because memantine must be started before significant neuronal loss occurs to prevent NMDA receptor damage'}
],
rat:'<strong>B is correct.</strong> Memantine is FDA-indicated for moderate to severe Alzheimer\'s disease — not mild. It works by blocking NMDA receptors to reduce glutamate-mediated excitotoxicity, which becomes more clinically relevant as the disease advances. Client A (MMSE 22 = mild) would typically receive a cholinesterase inhibitor first.',
bd:{a:'❌ Memantine is not first-line for mild disease. Cholinesterase inhibitors are used for mild-to-moderate AD.',b:'✅ Moderate to severe AD = memantine\'s indication. NMDA receptor antagonism reduces glutamate excitotoxicity that damages remaining neurons.',c:'❌ Cholinesterase inhibitors are available in multiple routes including transdermal. Route limitations are not the reason to select memantine.',d:'❌ Memantine is not used in early/mild disease — this contradicts the evidence-based staging of Alzheimer\'s pharmacotherapy.'},
mem:'📊 Alzheimer\'s staging for drugs: MILD → Cholinesterase inhibitors first. MODERATE-SEVERE → Add or switch to memantine. SEVERE → Can combine both classes. Think: "Donepezil starts the journey; memantine kicks in when the disease gets harder."'},

{id:53,type:'sata',drug:'Memantine',tag:"Alzheimer's",
stem:'A nurse is providing discharge teaching to the family of a client with moderate-to-severe Alzheimer\'s disease starting memantine. Which points should be included in the teaching? <em>Select all that apply.</em>',
opts:[
{id:'a',text:'The medication can be mixed with soft foods such as applesauce for clients who have difficulty swallowing',correct:true},
{id:'b',text:'Memantine may be combined with donepezil for complementary benefit since they work by different mechanisms',correct:true},
{id:'c',text:'Expect a full reversal of memory loss within the first 60 days of treatment'},
{id:'d',text:'Monitor for dizziness, confusion, or headache, which are potential adverse effects of this medication',correct:true},
{id:'e',text:'Inform the provider of any other medications that block NMDA receptors, as additive effects may cause adverse reactions',correct:true},
{id:'f',text:'The therapeutic goal is to maintain current functional ability for as long as possible, not to reverse existing cognitive deficits',correct:true}
],
rat:'<strong>A, B, D, E, and F are correct.</strong> Memantine can be sprinkled on soft food or given as an oral liquid. It can be safely combined with donepezil. Dizziness, confusion, and headache are listed adverse effects. NMDA antagonist combinations (e.g., ketamine) can cause synergistic adverse effects. The therapeutic goal is functional maintenance — not reversal of deficits. Memory reversal does not occur with any Alzheimer\'s medication.',
bd:{a:'✅ Mixing with soft foods is an explicit administration option for memantine.',b:'✅ Memantine + donepezil = complementary combination with different mechanisms.',c:'❌ Memory reversal does not occur. Memantine may slow further cognitive decline — it cannot restore what has been lost.',d:'✅ CNS adverse effects (dizziness, confusion, headache) are listed and require monitoring.',e:'✅ Other NMDA antagonists (ketamine, dextromethorphan) create additive adverse effects and must be disclosed to the provider.',f:'✅ Functional maintenance and slowing decline are the achievable and appropriate goals.'},
mem:'🧩 Memantine = "Hold the Line." It can\'t rebuild Alzheimer\'s damage. It holds the current line as long as possible. Combinations with donepezil = OK. NMDA + NMDA = RISK. Soft food mixing = helpful for dysphagia. Dizziness and headache = common side effects to watch for.'},

{id:54,type:'mc',drug:'Memantine',tag:"Alzheimer's",
stem:'A client with severe Alzheimer\'s disease has been on both memantine and donepezil for six months. The client\'s family reports increased agitation and confusion over the past two weeks. The provider evaluates the client and determines the confusion is a possible adverse effect of memantine. Which action does the nurse anticipate the provider will take?',
opts:[
{id:'a',text:'Immediately discontinue both memantine and donepezil and initiate a different drug class'},
{id:'b',text:'Evaluate whether the memantine dose should be reduced or whether an alternative drug is causing the confusion, and adjust accordingly',correct:true},
{id:'c',text:'Add a benzodiazepine to the regimen to manage the agitation while continuing both Alzheimer\'s medications unchanged'},
{id:'d',text:'Increase the memantine dose to achieve a more complete NMDA blockade, which may resolve the confusion'}
],
rat:'<strong>B is correct.</strong> Confusion is a documented adverse effect of memantine. The provider must evaluate the clinical picture — including medication timing, dose, and other potential causes — before making a management decision. Immediate discontinuation of both medications is too aggressive. Increasing the dose of the potentially causative agent is contraindicated. Adding a benzodiazepine adds sedation risk in a cognitively impaired elder.',
bd:{a:'❌ Discontinuing both without further evaluation is overly aggressive. Only the causative agent should be addressed first.',b:'✅ Evaluate first, then adjust accordingly. Dose reduction, drug change, or identification of another cause are all reasonable options to explore.',c:'❌ Benzodiazepines in elderly patients with Alzheimer\'s carry high risk for paradoxical agitation, falls, and respiratory depression.',d:'❌ Increasing the dose of the medication suspected of causing confusion would worsen the adverse effect.'},
mem:'🔍 Adverse effect management rule: "Evaluate FIRST, then adjust." Never jump to stopping everything or increasing the suspect drug. The provider must confirm the cause before acting. Benzodiazepines in elderly dementia patients = Beers Criteria concern. Always the systematic approach!'},

{id:55,type:'matrix',drug:'Memantine',tag:"Alzheimer's",
stem:'A nurse evaluates a family\'s understanding of memantine therapy after teaching. For each family statement, indicate whether it reflects <strong>Effective</strong> or <strong>Ineffective</strong> understanding.',
cols:['Effective Understanding','Ineffective — Needs Reinforcement'],
rows:[
{t:'"We understand this medication may help maintain her ability to dress and feed herself for longer"',c:0},
{t:'"We read that dextromethorphan cough syrup has a similar mechanism — we\'ve been giving it along with memantine to help more"',c:1},
{t:'"We know she can take memantine and donepezil at the same time since they work differently"',c:0},
{t:'"We expect her to recognize us by name again once she has been on this medication for a few weeks"',c:1},
{t:'"We\'ve been giving the tablet crushed in her oatmeal since she has trouble swallowing pills"',c:0},
{t:'"We watch for signs of dizziness or increased confusion and report them to her doctor"',c:0}
],
rat:'<strong>Rows 1, 3, 5, and 6 reflect effective understanding. Rows 2 and 4 reflect ineffective understanding.</strong> Dextromethorphan is an NMDA receptor antagonist — combining it with memantine creates additive adverse effects and is not recommended without provider guidance. Expecting cognitive restoration (recognizing family members by name) reflects unrealistic expectations — memantine cannot reverse established deficits.',
bd:{row0:'Effective — Maintaining functional independence (ADLs) is a realistic and appropriate therapeutic goal.',row1:'Ineffective — Dextromethorphan is an NMDA antagonist. Combining two NMDA antagonists without provider guidance risks synergistic adverse effects.',row2:'Effective — Memantine + donepezil is a supported combination with complementary mechanisms.',row3:'Ineffective — Expecting cognitive restoration (name recognition recovery) is unrealistic. Memantine slows progression but cannot reverse established losses.',row4:'Effective — Crushing and mixing with soft food is an appropriate administration method for memantine.',row5:'Effective — Monitoring for dizziness and confusion reflects correct adverse effect teaching.'},
mem:'⚗️ Dextromethorphan is in every cough syrup and is an NMDA antagonist — same class as memantine! Teach families: "No OTC cough/cold drugs without checking with the provider first." And: "This drug SLOWS decline — it doesn\'t REVERSE it. Recognizing faces again? Not a realistic goal."'},

{id:56,type:'mc',drug:'Memantine',tag:"Alzheimer's",
stem:'A client with Alzheimer\'s disease is currently prescribed donepezil and will be starting memantine. The client\'s daughter asks whether her mother needs to stop the donepezil when starting memantine. Which response by the nurse is most accurate?',
opts:[
{id:'a',text:'"Yes, one medication must be stopped because taking both simultaneously causes excessive cholinergic stimulation"'},
{id:'b',text:'"Yes, donepezil should be tapered over two weeks before starting memantine to prevent an overlap interaction"'},
{id:'c',text:'"No, the two medications can be taken together — they have different mechanisms of action and are complementary in Alzheimer\'s management"',correct:true},
{id:'d',text:'"No, both should be continued, but memantine must always be given at a different time of day than donepezil to prevent absorption competition"'}
],
rat:'<strong>C is correct.</strong> Memantine (NMDA antagonist) and donepezil (cholinesterase inhibitor) work by completely different mechanisms. They can be safely combined and are, in fact, commonly prescribed together for clients with moderate-to-severe Alzheimer\'s disease — providing complementary therapeutic effects.',
bd:{a:'❌ There is no excessive cholinergic stimulation from this combination. Memantine does not affect cholinergic activity.',b:'❌ No taper or washout is required. The two agents are complementary.',c:'✅ Different mechanisms, no adverse interaction — combination is supported and commonly used.',d:'❌ There is no absorption competition or timing requirement. This combination can be taken on any schedule.'},
mem:'✅ Donepezil + Memantine = DREAM TEAM for moderate-severe AD. Donepezil = boosts ACh (cholinergic). Memantine = blocks NMDA (glutamate). Different systems, complementary actions, no adverse interaction. No need to stop one before starting the other!'},

{id:57,type:'mc',drug:'Galantamine',tag:"Alzheimer's",
stem:'A client with mild Alzheimer\'s disease is prescribed galantamine. The nurse understands galantamine is differentiated from other cholinesterase inhibitors because it also:',
opts:[
{id:'a',text:'Inhibits COMT, providing additional protection of dopamine pathways in the Alzheimer\'s brain'},
{id:'b',text:'Blocks NMDA glutamate receptors in addition to inhibiting acetylcholinesterase'},
{id:'c',text:'Modulates nicotinic acetylcholine receptors in addition to inhibiting acetylcholinesterase activity',correct:true},
{id:'d',text:'Directly stimulates muscarinic acetylcholine receptors in the hippocampus and cortex'}
],
rat:'<strong>C is correct.</strong> Galantamine has a dual mechanism that distinguishes it from donepezil and rivastigmine. In addition to inhibiting acetylcholinesterase (like other agents in the class), galantamine also modulates nicotinic acetylcholine receptors, potentially providing an additional avenue for enhancing cholinergic neurotransmission in Alzheimer\'s disease.',
bd:{a:'❌ Galantamine does not affect COMT — that is the mechanism of entacapone, a Parkinson\'s drug.',b:'❌ NMDA receptor antagonism is the mechanism of memantine, not galantamine.',c:'✅ Nicotinic acetylcholine receptor modulation is galantamine\'s distinguishing feature within the cholinesterase inhibitor class.',d:'❌ Galantamine does not directly stimulate muscarinic receptors; it modulates nicotinic receptors.'},
mem:'🔑 Galantamine = "Double ACh action." Like all cholinesterase inhibitors, it blocks AChE. But it ALSO modulates nicotinic receptors (nAChR). Think: Donepezil = one action, Galantamine = two actions. For mild-moderate AD — same indication, slightly different mechanism.'},

{id:58,type:'sata',drug:'Galantamine',tag:"Alzheimer's",
stem:'A nurse is providing teaching for a client newly prescribed galantamine for mild Alzheimer\'s disease. Which points should the nurse include in the teaching? <em>Select all that apply.</em>',
opts:[
{id:'a',text:'Administer galantamine with food to reduce GI adverse effects',correct:true},
{id:'b',text:'Report any new onset of slow or irregular heartbeat or episodes of dizziness',correct:true},
{id:'c',text:'Do not take with other medications that slow the heart, such as beta-blockers, without first notifying the provider',correct:true},
{id:'d',text:'Galantamine will restore the client\'s ability to form and retain new long-term memories with consistent use'},
{id:'e',text:'The medication should not be discontinued abruptly without provider guidance — a gradual reduction is preferred if stopping is needed',correct:true},
{id:'f',text:'Clients with severe renal or hepatic impairment may require dose adjustments or avoidance of the medication',correct:true}
],
rat:'<strong>A, B, C, E, and F are correct.</strong> Galantamine is taken with food to reduce GI adverse effects. Bradycardia is a class-wide adverse effect of cholinesterase inhibitors requiring monitoring. Additive bradycardia with beta-blockers and other agents requires provider awareness. Gradual dose reduction is preferred over abrupt discontinuation. Renal and hepatic function affect galantamine metabolism and dose. Galantamine does not restore the ability to form new long-term memories.',
bd:{a:'✅ Food administration reduces the nausea and GI effects common to cholinesterase inhibitors.',b:'✅ Bradycardia is a class-wide adverse effect — patients must monitor and report.',c:'✅ Beta-blockers + cholinesterase inhibitors = additive bradycardia risk.',d:'❌ Galantamine improves or maintains cognitive function modestly but does not restore the ability to form new long-term memories.',e:'✅ Abrupt discontinuation may cause rapid disease symptom worsening — gradual reduction is preferred.',f:'✅ Galantamine dose adjustments are required for significant renal or hepatic impairment.'},
mem:'🍽️ Galantamine = "Take with food!" This is the most commonly tested administration point. Why? Food reduces GI adverse effects (nausea, vomiting). Also: beta-blockers + galantamine = heart rate drops faster. Renal and liver impairment = reduce the dose. Same bradycardia monitoring as all AChEIs.'},
